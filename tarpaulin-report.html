<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

        var data = {"files":[{"path":["/","home","supergeoff","projects","sympheo","src","agent","backend","daytona.rs"],"content":"use async_trait::async_trait;\nuse serde::{Deserialize, Serialize};\nuse std::path::Path;\nuse std::time::Duration;\nuse tokio::time::timeout;\n\nuse crate::agent::backend::AgentBackend;\nuse crate::agent::parser::{parse_line, OpencodeEvent, TokenInfo, TurnResult};\nuse crate::config::typed::ServiceConfig;\nuse crate::error::SympheoError;\nuse crate::tracker::model::Issue;\nuse crate::workspace::manager::WorkspaceManager;\n\n#[derive(Debug, Clone)]\npub struct DaytonaConfig {\n    api_key: String,\n    api_url: String,\n    target: String,\n    image: Option\u003cString\u003e,\n    timeout_sec: u64,\n    env: std::collections::HashMap\u003cString, String\u003e,\n    command: String,\n    turn_timeout_ms: u64,\n}\n\nimpl DaytonaConfig {\n    pub fn from_service(config: \u0026ServiceConfig) -\u003e Result\u003cSelf, SympheoError\u003e {\n        let _daytona_map = config\n            .daytona()\n            .ok_or_else(|| SympheoError::InvalidConfiguration(\n                \"daytona section required when backend is enabled\".into(),\n            ))?;\n\n        let api_key = config.daytona_api_key()\n            .ok_or(SympheoError::InvalidConfiguration(\n                \"daytona.api_key is required\".into(),\n            ))?;\n\n        Ok(Self {\n            api_key,\n            api_url: config.daytona_api_url(),\n            target: config.daytona_target(),\n            image: config.daytona_image(),\n            timeout_sec: config.daytona_timeout_sec(),\n            env: config.daytona_env(),\n            command: config.codex_command(),\n            turn_timeout_ms: config.codex_turn_timeout_ms(),\n        })\n    }\n}\n\n#[derive(Debug, Clone, Deserialize, Serialize)]\nstruct DaytonaSandbox {\n    id: String,\n    #[serde(default)]\n    state: String,\n}\n\n#[derive(Debug, Clone, Deserialize)]\nstruct DaytonaExecuteResponse {\n    #[serde(default)]\n    result: String,\n    #[serde(default)]\n    exit_code: i32,\n}\n\npub struct DaytonaBackend {\n    config: DaytonaConfig,\n    workspace_manager: WorkspaceManager,\n    client: reqwest::Client,\n}\n\nimpl DaytonaBackend {\n    pub fn new(service_config: \u0026ServiceConfig) -\u003e Result\u003cSelf, SympheoError\u003e {\n        let config = DaytonaConfig::from_service(service_config)?;\n        let workspace_manager = WorkspaceManager::new(service_config)?;\n        let client = reqwest::Client::builder()\n            .timeout(Duration::from_secs(config.timeout_sec.max(30)))\n            .build()\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"client build: {e}\")))?;\n        Ok(Self {\n            config,\n            workspace_manager,\n            client,\n        })\n    }\n\n    fn sandbox_meta_path(\u0026self, workspace_path: \u0026Path) -\u003e std::path::PathBuf {\n        workspace_path.join(\".daytona_sandbox_id\")\n    }\n\n    async fn read_sandbox_id(\u0026self, workspace_path: \u0026Path) -\u003e Option\u003cString\u003e {\n        let path = self.sandbox_meta_path(workspace_path);\n        tokio::fs::read_to_string(\u0026path).await.ok().map(|s| s.trim().to_string())\n    }\n\n    async fn write_sandbox_id(\u0026self, workspace_path: \u0026Path, id: \u0026str) -\u003e Result\u003c(), SympheoError\u003e {\n        let path = self.sandbox_meta_path(workspace_path);\n        tokio::fs::write(\u0026path, id)\n            .await\n            .map_err(|e| SympheoError::Io(format!(\"write sandbox id: {e}\")))?;\n        Ok(())\n    }\n\n    async fn create_sandbox(\u0026self) -\u003e Result\u003cDaytonaSandbox, SympheoError\u003e {\n        let url = format!(\"{}/api/sandbox\", self.config.api_url.trim_end_matches('/'));\n\n        let mut payload = serde_json::Map::new();\n        if let Some(ref img) = self.config.image {\n            payload.insert(\"image\".to_string(), serde_json::Value::String(img.clone()));\n        }\n        payload.insert(\"target\".to_string(), serde_json::Value::String(self.config.target.clone()));\n        if !self.config.env.is_empty() {\n            let env_map: serde_json::Map\u003cString, serde_json::Value\u003e = self.config\n                .env\n                .iter()\n                .map(|(k, v)| (k.clone(), serde_json::Value::String(v.clone())))\n                .collect();\n            payload.insert(\"env\".to_string(), serde_json::Value::Object(env_map));\n        }\n\n        tracing::info!(url = %url, \"creating Daytona sandbox\");\n\n        let resp = self\n            .client\n            .post(\u0026url)\n            .header(\"Authorization\", format!(\"Bearer {}\", self.config.api_key))\n            .header(\"Content-Type\", \"application/json\")\n            .json(\u0026payload)\n            .send()\n            .await\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"create sandbox request: {e}\")))?;\n\n        let status = resp.status();\n        let body = resp\n            .text()\n            .await\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"create sandbox body: {e}\")))?;\n\n        if !status.is_success() {\n            return Err(SympheoError::DaytonaApiError(format!(\n                \"create sandbox failed: HTTP {} - {}\",\n                status, body\n            )));\n        }\n\n        let sandbox: DaytonaSandbox = serde_json::from_str(\u0026body)\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"create sandbox json: {e} ({body})\")))?;\n\n        tracing::info!(sandbox_id = %sandbox.id, \"daytona sandbox created\");\n        Ok(sandbox)\n    }\n\n    #[allow(dead_code)]\n    async fn delete_sandbox(\u0026self, sandbox_id: \u0026str) -\u003e Result\u003c(), SympheoError\u003e {\n        let url = format!(\n            \"{}/api/sandbox/{}\",\n            self.config.api_url.trim_end_matches('/'),\n            sandbox_id\n        );\n        let resp = self\n            .client\n            .delete(\u0026url)\n            .header(\"Authorization\", format!(\"Bearer {}\", self.config.api_key))\n            .send()\n            .await\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"delete sandbox request: {e}\")))?;\n\n        if !resp.status().is_success() {\n            let body = resp.text().await.unwrap_or_default();\n            tracing::warn!(sandbox_id = %sandbox_id, body = %body, \"failed to delete daytona sandbox\");\n        } else {\n            tracing::info!(sandbox_id = %sandbox_id, \"daytona sandbox deleted\");\n        }\n        Ok(())\n    }\n\n    async fn execute_command(\n        \u0026self,\n        sandbox_id: \u0026str,\n        command: \u0026str,\n        cwd: \u0026str,\n    ) -\u003e Result\u003cDaytonaExecuteResponse, SympheoError\u003e {\n        let url = format!(\n            \"https://proxy.app.daytona.io/toolbox/{}/process/execute\",\n            sandbox_id\n        );\n\n        let payload = serde_json::json!({\n            \"command\": command,\n            \"cwd\": cwd,\n            \"timeout\": self.config.timeout_sec as u32,\n        });\n\n        tracing::debug!(sandbox_id = %sandbox_id, command = %command, \"executing in daytona sandbox\");\n\n        let resp = self\n            .client\n            .post(\u0026url)\n            .header(\"Authorization\", format!(\"Bearer {}\", self.config.api_key))\n            .header(\"Content-Type\", \"application/json\")\n            .json(\u0026payload)\n            .send()\n            .await\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"execute request: {e}\")))?;\n\n        let status = resp.status();\n        let body = resp\n            .text()\n            .await\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"execute body: {e}\")))?;\n\n        if !status.is_success() {\n            return Err(SympheoError::DaytonaApiError(format!(\n                \"execute failed: HTTP {} - {}\",\n                status, body\n            )));\n        }\n\n        let result: DaytonaExecuteResponse = serde_json::from_str(\u0026body)\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"execute json: {e} ({body})\")))?;\n\n        Ok(result)\n    }\n}\n\n#[async_trait]\nimpl AgentBackend for DaytonaBackend {\n    async fn run_turn(\n        \u0026self,\n        issue: \u0026Issue,\n        prompt: \u0026str,\n        session_id: Option\u003c\u0026str\u003e,\n        workspace_path: \u0026Path,\n    ) -\u003e Result\u003cTurnResult, SympheoError\u003e {\n        self.workspace_manager\n            .validate_inside_root(workspace_path)?;\n\n        let sandbox_id = match self.read_sandbox_id(workspace_path).await {\n            Some(id) =\u003e id,\n            None =\u003e {\n                let sandbox = self.create_sandbox().await?;\n                self.write_sandbox_id(workspace_path, \u0026sandbox.id).await?;\n                sandbox.id\n            }\n        };\n\n        let mut opencode_cmd = format!(\n            r#\"{} \"{}\" --format json --dir {} --dangerously-skip-permissions\"#,\n            self.config.command,\n            shell_escape(prompt),\n            shell_escape(\u0026workspace_path.to_string_lossy())\n        );\n        if let Some(sid) = session_id {\n            opencode_cmd.push_str(\u0026format!(\" --session {}\", shell_escape(sid)));\n        }\n\n        tracing::info!(\n            issue_id = %issue.id,\n            issue_identifier = %issue.identifier,\n            sandbox_id = %sandbox_id,\n            \"launching opencode agent (daytona backend)\"\n        );\n\n        let exec_result = timeout(\n            Duration::from_millis(self.config.turn_timeout_ms),\n            self.execute_command(\u0026sandbox_id, \u0026opencode_cmd, \"/workspace\"),\n        )\n        .await\n        .map_err(|_| SympheoError::AgentTurnTimeout)?;\n\n        let exec = exec_result?;\n\n        if exec.exit_code != 0 {\n            return Err(SympheoError::AgentRunnerError(format!(\n                \"daytona process exited with code {}: {}\",\n                exec.exit_code, exec.result\n            )));\n        }\n\n        let mut current_session: Option\u003cString\u003e = None;\n        let mut current_turn: Option\u003cString\u003e = None;\n        let mut accumulated_text = String::new();\n        let mut tokens: Option\u003cTokenInfo\u003e = None;\n        let mut success = false;\n\n        for line in exec.result.lines() {\n            if line.trim().is_empty() {\n                continue;\n            }\n            match parse_line(line) {\n                Some(OpencodeEvent::StepStart { session_id, part, .. }) =\u003e {\n                    current_session = Some(session_id);\n                    current_turn = Some(part.message_id.clone());\n                }\n                Some(OpencodeEvent::Text { part, .. }) =\u003e {\n                    accumulated_text.push_str(\u0026part.text);\n                }\n                Some(OpencodeEvent::StepFinish { part, .. }) =\u003e {\n                    tokens = part.tokens.clone();\n                    success = part.reason == \"stop\" || part.reason == \"tool-calls\";\n                    break;\n                }\n                _ =\u003e {}\n            }\n        }\n\n        let sid = current_session.unwrap_or_else(|| issue.id.clone());\n        let tid = current_turn.unwrap_or_else(|| \"turn-1\".into());\n\n        Ok(TurnResult {\n            session_id: sid.clone(),\n            turn_id: tid,\n            success,\n            text: accumulated_text,\n            tokens,\n        })\n    }\n}\n\nfn shell_escape(s: \u0026str) -\u003e String {\n    s.replace('\\\\', \"\\\\\\\\\")\n        .replace('\"', \"\\\\\\\"\")\n        .replace('$', \"\\\\$\")\n        .replace('`', \"\\\\`\")\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::path::PathBuf;\n\n    fn service_config_with_daytona(api_url: \u0026str) -\u003e ServiceConfig {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut daytona = serde_yaml::Mapping::new();\n        daytona.insert(\n            serde_yaml::Value::String(\"enabled\".into()),\n            serde_yaml::Value::Bool(true),\n        );\n        daytona.insert(\n            serde_yaml::Value::String(\"api_key\".into()),\n            serde_yaml::Value::String(\"test-key\".into()),\n        );\n        daytona.insert(\n            serde_yaml::Value::String(\"api_url\".into()),\n            serde_yaml::Value::String(api_url.into()),\n        );\n        daytona.insert(\n            serde_yaml::Value::String(\"target\".into()),\n            serde_yaml::Value::String(\"eu\".into()),\n        );\n        daytona.insert(\n            serde_yaml::Value::String(\"image\".into()),\n            serde_yaml::Value::String(\"custom-image\".into()),\n        );\n        daytona.insert(\n            serde_yaml::Value::String(\"timeout_sec\".into()),\n            serde_yaml::Value::Number(7200.into()),\n        );\n        let mut env = serde_yaml::Mapping::new();\n        env.insert(\n            serde_yaml::Value::String(\"FOO\".into()),\n            serde_yaml::Value::String(\"bar\".into()),\n        );\n        daytona.insert(\n            serde_yaml::Value::String(\"env\".into()),\n            serde_yaml::Value::Mapping(env),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"daytona\".into()),\n            serde_yaml::Value::Mapping(daytona),\n        );\n        let mut codex = serde_yaml::Mapping::new();\n        codex.insert(\n            serde_yaml::Value::String(\"command\".into()),\n            serde_yaml::Value::String(\"opencode run\".into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"codex\".into()),\n            serde_yaml::Value::Mapping(codex),\n        );\n        ServiceConfig::new(raw, PathBuf::from(\"/tmp\"), \"prompt\".into())\n    }\n\n    #[test]\n    fn test_daytona geoff","projects","sympheo","src","agent","backend","local.rs"],"content":"use async_trait::async_trait;\nuse crate::agent::backend::AgentBackend;\nuse crate::agent::parser::{parse_line, OpencodeEvent, TokenInfo, TurnResult};\nuse crate::config::typed::ServiceConfig;\nuse crate::error::SympheoError;\nuse crate::tracker::model::Issue;\nuse crate::workspace::manager::WorkspaceManager;\nuse std::path::Path;\nuse std::process::Stdio;\nuse tokio::io::{AsyncBufReadExt, BufReader};\nuse tokio::process::Command;\nuse tokio::time::{timeout, Duration};\n\npub struct LocalBackend {\n    command: String,\n    turn_timeout: Duration,\n    workspace_manager: WorkspaceManager,\n}\n\nimpl LocalBackend {\n    pub fn new(config: \u0026ServiceConfig) -\u003e Result\u003cSelf, SympheoError\u003e {\n        Ok(Self {\n            command: config.codex_command(),\n            turn_timeout: Duration::from_millis(config.codex_turn_timeout_ms()),\n            workspace_manager: WorkspaceManager::new(config)?,\n        })\n    }\n}\n\n#[async_trait]\nimpl AgentBackend for LocalBackend {\n    async fn run_turn(\n        \u0026self,\n        issue: \u0026Issue,\n        prompt: \u0026str,\n        session_id: Option\u003c\u0026str\u003e,\n        workspace_path: \u0026Path,\n    ) -\u003e Result\u003cTurnResult, SympheoError\u003e {\n        self.workspace_manager\n            .validate_inside_root(workspace_path)?;\n\n        let mut cmd = Command::new(\"bash\");\n        cmd.arg(\"-lc\");\n\n        let mut opencode_cmd = format!(\n            r#\"{} \"{}\" --format json --dir {} --dangerously-skip-permissions\"#,\n            self.command,\n            shell_escape(prompt),\n            shell_escape(\u0026workspace_path.to_string_lossy())\n        );\n        if let Some(sid) = session_id {\n            opencode_cmd.push_str(\u0026format!(\" --session {}\", shell_escape(sid)));\n        }\n        cmd.arg(\u0026opencode_cmd);\n        cmd.current_dir(workspace_path);\n        cmd.stdout(Stdio::piped());\n        cmd.stderr(Stdio::piped());\n\n        tracing::info!(\n            issue_id = %issue.id,\n            issue_identifier = %issue.identifier,\n            \"launching opencode agent (local backend)\"\n        );\n\n        let mut child = cmd\n            .spawn()\n            .map_err(|e| SympheoError::AgentRunnerError(format!(\"spawn failed: {e}\")))?;\n\n        let stdout = child\n            .stdout\n            .take()\n            .ok_or_else(|| SympheoError::AgentRunnerError(\"missing stdout\".into()))?;\n        let stderr = child\n            .stderr\n            .take()\n            .ok_or_else(|| SympheoError::AgentRunnerError(\"missing stderr\".into()))?;\n\n        // Spawn stderr reader task to capture agent diagnostic output\n        let issue_id_for_stderr = issue.id.clone();\n        let stderr_handle = tokio::spawn(async move {\n            let stderr_reader = BufReader::new(stderr);\n            let mut stderr_lines = stderr_reader.lines();\n            while let Ok(Some(line)) = stderr_lines.next_line().await {\n                let trimmed = line.trim();\n                if !trimmed.is_empty() {\n                    tracing::warn!(\n                        issue_id = %issue_id_for_stderr,\n                        target = \"opencode::stderr\",\n                        \"{}\",\n                        trimmed\n                    );\n                }\n            }\n        });\n\n        let reader = BufReader::new(stdout);\n        let mut lines = reader.lines();\n\n        let mut current_session: Option\u003cString\u003e = None;\n        let mut current_turn: Option\u003cString\u003e = None;\n        let mut accumulated_text = String::new();\n        let mut tokens: Option\u003cTokenInfo\u003e = None;\n        let mut success = false;\n\n        let read_result = timeout(self.turn_timeout, async {\n            while let Ok(Some(line)) = lines.next_line().await {\n                if line.trim().is_empty() {\n                    continue;\n                }\n                match parse_line(\u0026line) {\n                    Some(OpencodeEvent::StepStart { session_id, part, .. }) =\u003e {\n                        current_session = Some(session_id);\n                        current_turn = Some(part.message_id.clone());\n                        tracing::debug!(session = %part.session_id, message = %part.message_id, \"step_start\");\n                    }\n                    Some(OpencodeEvent::Text { part, .. }) =\u003e {\n                        accumulated_text.push_str(\u0026part.text);\n                    }\n                    Some(OpencodeEvent::StepFinish { part, .. }) =\u003e {\n                        tokens = part.tokens.clone();\n                        success = part.reason == \"stop\" || part.reason == \"tool-calls\";\n                        tracing::info!(\n                            reason = %part.reason,\n                            success,\n                            \"step_finish\"\n                        );\n                        break;\n                    }\n                    _ =\u003e {}\n                }\n            }\n        })\n        .await;\n\n        if read_result.is_err() {\n            let _ = child.kill().await;\n            let _ = stderr_handle.abort();\n            return Err(SympheoError::AgentTurnTimeout);\n        }\n\n        // Terminate the process since the turn is complete\n        // opencode run may not exit on its own after step_finish\n        let _ = child.kill().await;\n        let _ = stderr_handle.abort();\n        // Attempt to reap the process without blocking the result\n        let _ = timeout(Duration::from_secs(5), child.wait()).await;\n\n        let sid = current_session.unwrap_or_else(|| issue.id.clone());\n        let tid = current_turn.unwrap_or_else(|| \"turn-1\".into());\n\n        Ok(TurnResult {\n            session_id: sid.clone(),\n            turn_id: tid,\n            success,\n            text: accum self) -\u003e Option\u003c\u0026serde_yaml::Mapping\u003e {\n        self.raw.get(\"tracker\").and_then(|v| v.as_mapping())\n    }\n\n    fn polling(\u0026self) -\u003e Option\u003c\u0026serde_yaml::Mapping\u003e {\n        self.raw.get(\"polling\").and_then(|v| v.as_mapping())\n    }\n\n    fn workspace(\u0026self) -\u003e Option\u003c\u0026serde_yaml::Mapping\u003e {\n        self.raw.get(\"workspace\").and_then(|v| v.as_mapping())\n    }\n\n    fn hooks(\u0026self) -\u003e Option\u003c\u0026serde_yaml::Mapping\u003e {\n        self.raw.get(\"hooks\").and_then(|v| v.as_mapping())\n    }\n\n    fn agent(\u0026self) -\u003e Option\u003c\u0026serde_yaml::Mapping\u003e {\n        self.raw.get(\"agent\").and_then(|v| v.as_mapping())\n    }\n\n    fn codex(\u0026self) -\u003e Option\u003c\u0026serde_yaml::Mapping\u003e {\n        self.raw.get(\"codex\").and_then(|v| v.as_mapping())\n    }\n\n    pub fn daytona(\u0026self) -\u003e Option\u003c\u0026serde_yaml::Mapping\u003e {\n        self.raw.get(\"daytona\").and_then(|v| v.as_mapping())\n    }\n\n    pub fn tracker_kind(\u0026self) -\u003e Option\u003cString\u003e {\n        self.tracker()\n            .and_then(|m| resolver::get_string(m, \"kind\"))\n    }\n\n    pub fn tracker_endpoint(\u0026self) -\u003e String {\n        self.tracker()\n            .and_then(|m| resolver::get_string(m, \"endpoint\"))\n            .unwrap_or_else(|| \"https://api.github.com\".to_string())\n    }\n\n    pub fn tracker_api_key(\u0026self) -\u003e Option\u003cString\u003e {\n        self.tracker()\n            .and_then(|m| resolver::get_string(m, \"api_key\"))\n            .map(|s| resolver::resolve_value(\u0026s))\n            .filter(|s| !s.is_empty())\n    }\n\n    pub fn tracker_project_slug(\u0026self) -\u003e Option\u003cString\u003e {\n        self.tracker()\n            .and_then(|m| resolver::get_string(m, \"project_slug\"))\n    }\n\n    pub fn tracker_project_number(\u0026self) -\u003e Option\u003ci64\u003e {\n        self.tracker()\n            .and_then(|m| resolver::get_i64(m, \"project_number\"))\n    }\n\n    pub fn active_states(\u0026self) -\u003e Vec\u003cString\u003e {\n        self.tracker()\n            .and_then(|m| resolver::get_str_list(m, \"active_states\"))\n            .unwrap_or_else(|| vec![\"Todo\".into(), \"In Progress\".into()])\n            .into_iter()\n            .map(|s| s.to_lowercase())\n            .collect()\n    }\n\n    pub fn terminal_states(\u0026self) -\u003e Vec\u003cString\u003e {\n        self.tracker()\n            .and_then(|m| resolver::get_str_list(m, \"terminal_states\"))\n            .unwrap_or_else(|| {\n                vec![\n                    \"Closed\".into(),\n                    \"Cancelled\".into(),\n                    \"Canceled\".into(),\n                    \"Duplicate\".into(),\n                    \"Done\".into(),\n                ]\n            })\n            .into_iter()\n            .map(|s| s.to_lowercase())\n            .collect()\n    }\n\n    pub fn poll_interval_ms(\u0026self) -\u003e u64 {\n        self.polling()\n            .and_then(|m| resolver::get_i64(m, \"interval_ms\"))\n            .unwrap_or(30000)\n            .max(1000) as u64\n    }\n\n    pub fn workspace_root(\u0026self) -\u003e Result\u003cPathBuf, SympheoError\u003e {\n        let raw = self\n            .workspace()\n            .and_then(|m| resolver::get_string(m, \"root\"))\n            .unwrap_or_else(|| {\n                std::env::temp_dir()\n                    .join(\"sympheo_workspaces\")\n                    .to_string_lossy()\n                    .to_string()\n            });\n        let resolved = resolver::resolve_path(\u0026raw, \u0026self.workflow_dir)?;\n        Ok(resolved)\n    }\n\n    pub fn hook_script(\u0026self, name: \u0026str) -\u003e Option\u003cString\u003e {\n        self.hooks().and_then(|m| resolver::get_string(m, name))\n    }\n\n    pub fn hook_timeout_ms(\u0026self) -\u003e u64 {\n        self.hooks()\n            .and_then(|m| resolver::get_i64(m, \"timeout_ms\"))\n            .unwrap_or(60000)\n            .max(0) as u64\n    }\n\n    pub fn max_concurrent_agents(\u0026self) -\u003e usize {\n        self.agent()\n            .and_then(|m| resolver::get_i64(m, \"max_concurrent_agents\"))\n            .unwrap_or(10)\n            .max(1) as usize\n    }\n\n    pub fn max_turns(\u0026self) -\u003e u32 {\n        self.agent()\n            .and_then(|m| resolver::get_i64(m, \"max_turns\"))\n            .unwrap_or(20)\n            .max(1) as u32\n    }\n\n    pub fn max_retry_backoff_ms(\u0026self) -\u003e u64 {\n        self.agent()\n            .and_then(|m| resolver::get_i64(m, \"max_retry_backoff_ms\"))\n            .unwrap_or(300000)\n            .max(1000) as u64\n    }\n\n    pub fn max_concurrent_agents_by_state(\u0026self) -\u003e HashMap\u003cString, usize\u003e {\n        let mut map = HashMap::new();\n        if let Some(agent_map) = self.agent() {\n            if let Some(state_map) = agent_map\n                .get(\"max_concurrent_agents_by_state\")\n                .and_then(|v| v.as_mapping())\n            {\n                for (k, v) in state_map {\n                    if let (Some(key), Some(val)) = (k.as_str(), v.as_i64()) {\n                        if val \u003e 0 {\n                            map.insert(key.to_lowercase(), val as usize);\n                        }\n                    }\n                }\n            }\n        }\n        map\n    }\n\n    pub fn codex_command(\u0026self) -\u003e String {\n        self.codex()\n            .and_then(|m| resolver::get_string(m, \"command\"))\n            .unwrap_or_else(|| \"opencode run\".to_string())\n    }\n\n    pub fn codex_turn_timeout_ms(\u0026self) -\u003e u64 {\n        self.codex()\n            .and_then(|m| resolver::get_i64(m, \"turn_timeout_ms\"))\n            .unwrap_or(3600000)\n            .max(0) as u64\n    }\n\n    pub fn codex_read_timeout_ms(\u0026self) -\u003e u64 {\n        self.codex()\n            .and_then(|m| resolver::get_i64(m, \"read_timeout_ms\"))\n            .unwrap_or(5000)\n            .max(0) as u64\n    }\n\n    pub fn codex_stall_timeout_ms(\u0026self) -\u003e i64 {\n        self.codex()\n            .and_then(|m| resolver::get_i64(m, \"stall_timeout_ms\"))\n            .unwrap_or(300000)\n    }\n\n    // Daytona helpers\n    pub fn daytona_enabled(\u0026self) -\u003e bool {\n        self.daytona()\n            .and_then(|m| m.get(\"enabled\").and_then(|v| v.as_bool()))\n            .unwrap_or(false)\n    }\n\n    pub fn daytona_api_key(\u0026self) -\u003e Option\u003cString\u003e {\n        self.daytona()\n            .and_then(|m| resolver::get_string(m, \"api_key\"))\n            .map(|s| resolver::resolve_value(\u0026s))\n            .filter(|s| !s.is_empty())\n    }\n\n    pub fn daytona_api_url(\u0026self) -\u003e String {\n        self.daytona()\n            .and_then(|m| resolver::get_string(m, \"api_url\"))\n            .unwrap_or_else(|| \"https://api.daytona.io\".to_string())\n    }\n\n    pub fn daytona_target(\u0026self) -\u003e String {\n        self.daytona()\n            .and_then(|m| resolver::get_string(m, \"target\"))\n            .unwrap_or_else(|| \"us\".to_string())\n    }\n\n    pub fn daytona_image(\u0026self) -\u003e Option\u003cString\u003e {\n        self.daytona()\n            .and_then(|m| resolver::get_string(m, \"image\"))\n            .filter(|s| !s.is_empty())\n    }\n\n    pub fn daytona_timeout_sec(\u0026self) -\u003e u64 {\n        self.daytona()\n            .and_then(|m| resolver::get_i64(m, \"timeout_sec\"))\n            .unwrap_or(3600)\n            .max(30) as u64\n    }\n\n    pub fn daytona_env(\u0026self) -\u003e HashMap\u003cString, String\u003e {\n        let mut map = HashMap::new();\n        if let Some(daytona_map) = self.daytona() {\n            if let Some(env_map) = daytona_map.get(\"env\").and_then(|v| v.as_mapping()) {\n                for (k, v) in env_map {\n                    if let (Some(key), Some(val)) = (k.as_str(), v.as_str()) {\n                        map.insert(key.to_string(), resolver::resolve_value(val));\n                    }\n                }\n            }\n        }\n        map\n    }\n\n    pub fn validate_for_dispatch(\u0026self) -\u003e Result\u003c(), SympheoError\u003e {\n        let kind = self.tracker_kind().ok_or(SympheoError::InvalidConfiguration(\n            \"tracker.kind is required\".into(),\n        ))?;\n        if kind != \"github\" {\n            return Err(SympheoError::UnsupportedTrackerKind(kind));\n        }\n        if self.tracker_api_key().is_none() {\n            return Err(SympheoError::MissingTrackerApiKey);\n        }\n        if self.tracker_project_slug().is_none() {\n            return Err(SympheoError::MissingTrackerProjectSlug);\n        }\n        if self.tracker_project_number().is_none() {\n            return Err(SympheoError::InvalidConfiguration(\n                \"tracker.project_number is required for github projects\".into(),\n            ));\n        }\n        let cmd = self.codex_command();\n        if cmd.trim().is_empty() {\n            return Err(SympheoError::InvalidConfiguration(\n                \"codex.command is empty\".into(),\n            ));\n        }\n        if self.daytona_enabled()\n            \u0026\u0026 self.daytona_api_key().is_none() {\n                return Err(SympheoError::InvalidConfiguration(\n                    \"daytona.api_key is required when backend is enabled\".into(),\n                ));\n            }\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::path::PathBuf;\n\n    fn empty_config() -\u003e ServiceConfig {\n        ServiceConfig::new(serde_yaml::Mapping::new(), PathBuf::from(\"/tmp\"), \"\".into())\n    }\n\n    fn config_with(raw: serde_yaml::Mapping) -\u003e ServiceConfig {\n        ServiceConfig::new(raw, PathBuf::from(\"/tmp\"), \"prompt\".into())\n    }\n\n    #[test]\n    fn test_raw_accessor() {\n        let config = empty_config();\n        assert!(config.raw().is_empty());\n    }\n\n    #[test]\n    fn test_tracker_kind_missing() {\n        assert_eq!(empty_config().tracker_kind(), None);\n    }\n\n    #[test]\n    fn test_tracker_kind_present() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut tracker = serde_yaml::Mapping::new();\n        tracker.insert(\n            serde_yaml::Value::String(\"kind\".into()),\n            serde_yaml::Value::String(\"github\".into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"tracker\".into()),\n            serde_yaml::Value::Mapping(tracker),\n        );\n        assert_eq!(config_with(raw).tracker_kind(), Some(\"github\".to_string()));\n    }\n\n    #[test]\n    fn test_tracker_endpoint_default() {\n        assert_eq!(empty_config().tracker_endpoint(), \"https://api.github.com\");\n    }\n\n    #[test]\n    fn test_tracker_endpoint_custom() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut tracker = serde_yaml::Mapping::new();\n        tracker.insert(\n            serde_yaml::Value::String(\"endpoint\".into()),\n            serde_yaml::Value::String(\"https://custom.github.com\".into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"tracker\".into()),\n            serde_yaml::Value::Mapping(tracker),\n        );\n        assert_eq!(config_with(raw).tracker_endpoint(), \"https://custom.github.com\");\n    }\n\n    #[test]\n    fn test_tracker_api_key_plain() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut tracker = serde_yaml::Mapping::new();\n        tracker.insert(\n            serde_yaml::Value::String(\"api_key\".into()),\n            serde_yaml::Value::String(\"secret123\".into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"tracker\".into()),\n            serde_yaml::Value::Mapping(tracker),\n        );\n        assert_eq!(config_with(raw).tracker_api_key(), Some(\"secret123\".to_string()));\n    }\n\n    #[test]\n    fn test_tracker_api_key_env_resolution() {\n        std::env::set_var(\"TEST_GH_KEY\", \"gh_secret\");\n        let mut raw = serde_yaml::Mapping::new();\n        let mut tracker = serde_yaml::Mapping::new();\n        tracker.insert(\n            serde_yaml::Value::String(\"api_key\".into()),\n            serde_yaml::Value::String(\"$TEST_GH_KEY\".into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"tracker\".into()),\n            serde_yaml::Value::Mapping(tracker),\n        );\n        assert_eq!(config_with(raw).tracker_api_key(), Some(\"gh_secret\".to_string()));\n        std::env::remove_var(\"TEST_GH_KEY\");\n    }\n\n    #[test]\n    fn test_tracker_api_key_empty_after_resolution() {\n        std::env::remove_var(\"TEST_EMPTY_KEY\");\n        let mut raw = serde_yaml::Mapping::new();\n        let mut tracker = serde_yaml::Mapping::new();\n        tracker.insert(\n            serde_yaml::Value::String(\"api_key\".into()),\n            serde_yaml::Value::String(\"$TEST_EMPTY_KEY\".into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"tracker\".into()),\n            serde_yaml::Value::Mapping(tracker),\n        );\n        assert_eq!(config_with(raw).tracker_api_key(), None);\n    }\n\n    #[test]\n    fn test_tracker_project_slug() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut tracker = serde_yaml::Mapping::new();\n        tracker.insert(\n            serde_yaml::Value::String(\"project_slug\".into()),\n            serde_yaml::Value::String(\"owner/repo\".into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"tracker\".into()),\n            serde_yaml::Value::Mapping(tracker),\n        );\n        assert_eq!(config_with(raw).tracker_project_slug(), Some(\"owner/repo\".to_string()));\n    }\n\n    #[test]\n    fn test_tracker_project_number() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut tracker = serde_yaml::Mapping::new();\n        tracker.insert(\n            serde_yaml::Value::String(\"project_number\".into()),\n            serde_yaml::Value::Number(42.into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"tracker\".into()),\n            serde_yaml::Value::Mapping(tracker),\n        );\n        assert_eq!(config_with(raw).tracker_project_number(), Some(42));\n    }\n\n    #[test]\n    fn test_active_states_default() {\n        let states = empty_config().active_states();\n        assert_eq!(states, vec![\"todo\", \"in progress\"]);\n    }\n\n    #[test]\n    fn test_active_states_custom() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut tracker = serde_yaml::Mapping::new();\n        let seq = vec![\n            serde_yaml::Value::String(\"Backlog\".into()),\n            serde_yaml::Value::String(\"Ready\".into()),\n        ];\n        tracker.insert(\n            serde_yaml::Value::String(\"active_states\".into()),\n            serde_yaml::Value::Sequence(seq),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"tracker\".into()),\n            serde_yaml::Value::Mapping(tracker),\n        );\n        assert_eq!(config_with(raw).active_states(), vec![\"backlog\", \"ready\"]);\n    }\n\n    #[test]\n    fn test_terminal_states_default() {\n        let states = empty_config().terminal_states();\n        assert_eq!(states, vec![\"closed\", \"cancelled\", \"canceled\", \"duplicate\", \"done\"]);\n    }\n\n    #[test]\n    fn test_poll_interval_default() {\n        assert_eq!(empty_config().poll_interval_ms(), 30000);\n    }\n\n    #[test]\n    fn test_poll_interval_custom() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut polling = serde_yaml::Mapping::new();\n        polling.insert(\n            serde_yaml::Value::String(\"interval_ms\".into()),\n            serde_yaml::Value::Number(5000.into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"polling\".into()),\n            serde_yaml::Value::Mapping(polling),\n        );\n        assert_eq!(config_with(raw).poll_interval_ms(), 5000);\n    }\n\n    #[test]\n    fn test_poll_interval_min_clamp() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut polling = serde_yaml::Mapping::new();\n        polling.insert(\n            serde_yaml::Value::String(\"interval_ms\".into()),\n            serde_yaml::Value::Number(100.into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"polling\".into()),\n            serde_yaml::Value::Mapping(polling),\n        );\n        assert_eq!(config_with(raw).poll_interval_ms(), 1000);\n    }\n\n    #[test]\n    fn test_workspace_root_default() {\n        let root = empty_config().workspace_root().unwrap();\n        assert!(root.to_string_lossy().contains(\"sympheo_workspaces\"));\n    }\n\n    #[test]\n    fn test_hook_script() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut hooks = serde_yaml::Mapping::new();\n        hooks.insert(\n            serde_yaml::Value::String(\"after_create\".into()),\n            serde_yaml::Value::String(\"echo hello\".into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"hooks\".into()),\n            serde_yaml::Value::Mapping(hooks),\n        );\n        let config = config_with(raw);\n        assert_eq!(config.hook_script(\"after_create\"), Some(\"echo hello\".to_string()));\n        assert_eq!(config.hook_script(\"before_run\"), None);\n    }\n\n    #[test]\n    fn test_hook_timeout_default() {\n        assert_eq!(empty_config().hook_timeout_ms(), 60000);\n    }\n\n    #[test]\n    fn test_max_concurrent_agents_default() {\n        assert_eq!(empty_config().max_concurrent_agents(), 10);\n    }\n\n    #[test]\n    fn test_max_concurrent_agents_min_clamp() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut agent = serde_yaml::Mapping::new();\n        agent.insert(\n            serde_yaml::Value::String(\"max_concurrent_agents\".into()),\n            serde_yaml::Value::Number(0.into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"agent\".into()),\n            serde_yaml::Value::Mapping(agent),\n        );\n        assert_eq!(config_with(raw).max_concurrent_agents(), 1);\n    }\n\n    #[test]\n    fn test_max_turns_default() {\n        assert_eq!(empty_config().max_turns(), 20);\n    }\n\n    #[test]\n    fn test_max_turns_min_clamp() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut agent = serde_yaml::Mapping::new();\n        agent.insert(\n            serde_yaml::Value::String(\"max_turns\".into()),\n            serde_yaml::Value::Number(0.into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"agent\".into()),\n            serde_yaml::Value::Mapping(agent),\n        );\n        assert_eq!(config_with(raw).max_turns(), 1);\n    }\n\n    #[test]\n    fn test_max_retry_backoff_default() {\n        assert_eq!(empty_config().max_retry_backoff_ms(), 300000);\n    }\n\n    #[test]\n    fn test_max_retry_backoff_min_clamp() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut agent = serde_yaml::Mapping::new();\n        agent.insert(\n            serde_yaml::Value::String(\"max_retry_backoff_ms\".into()),\n            serde_yaml::Value::Number(100.into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"agent\".into()),\n            serde_yaml::Value::Mapping(agent),\n        );\n        assert_eq!(config_with(raw).max_retry_backoff_ms(), 1000);\n    }\n\n    #[test]\n    fn test_max_concurrent_agents_by_state() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut agent = serde_yaml::Mapping::new();\n        let mut state_map = serde_yaml::Mapping::new();\n        state_map.insert(\n            serde_yaml::Value::String(\"todo\".into()),\n            serde_yaml::Value::Number(3.into()),\n        );\n        state_map.insert(\n            serde_yaml::Value::String(\"in progress\".into()),\n            serde_yaml::Value::Number(5.into()),\n        );\n        state_map.insert(\n            serde_yaml::Value::String(\"invalid\".into()),\n            serde_yaml::Value::Number(0.into()),\n        );\n        agent.insert(\n            serde_yaml::Value::String(\"max_concurrent_agents_by_state\".into()),\n            serde_yaml::Value::Mapping(state_map),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"agent\".into()),\n            serde_yaml::Value::Mapping(agent),\n        );\n        let map = config_with(raw).max_concurrent_agents_by_state();\n        assert_eq!(map.get(\"todo\"), Some(\u00263usize));\n        assert_eq!(map.get(\"in progress\"), Some(\u00265usize));\n        assert!(!map.contains_key(\"invalid\"));\n    }\n\n    #[test]\n    fn test_codex_command_default() {\n        assert_eq!(empty_config().codex_command(), \"opencode run\");\n    }\n\n    #[test]\n    fn test_codex_turn_timeout_default() {\n        assert_eq!(empty_config().codex_turn_timeout_ms(), 3600000);\n    }\n\n    #[test]\n    fn test_codex_read_timeout_default() {\n        assert_eq!(empty_config().codex_read_timeout_ms(), 5000);\n    }\n\n    #[test]\n    fn test_codex_stall_timeout_default() {\n        assert_eq!(empty_config().codex_stall_timeout_ms(), 300000);\n    }\n\n    #[test]\n    fn test_daytona_enabled_default() {\n        assert!(!empty_config().daytona_enabled());\n    }\n\n    #[test]\n    fn test_daytona_api_key() {\n        std::env::set_var(\"TEST_DAYTONA_KEY\", \"dk\");\n        let mut raw = serde_yaml::Mapping::new();\n        let mut daytona = serde_yaml::Mapping::new();\n        daytona.insert(\n            serde_yaml::Value::String(\"api_key\".into()),\n            serde_yaml::Value::String(\"$TEST_DAYTONA_KEY\".into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"daytona\".into()),\n            serde_yaml::Value::Mapping(daytona),\n        );\n        assert_eq!(config_with(raw).daytona_api_key(), Some(\"dk\".to_string()));\n        std::env::remove_var(\"TEST_DAYTONA_KEY\");\n    }\n\n    #[test]\n    fn test_daytona_api_url_default() {\n        assert_eq!(empty_config().daytona_api_url(), \"https://api.daytona.io\");\n    }\n\n    #[test]\n    fn test_daytona_target_default() {\n        assert_eq!(empty_config().daytona_target(), \"us\");\n    }\n\n    #[test]\n    fn test_daytona_image() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut daytona = serde_yaml::Mapping::new();\n        daytona.insert(\n            serde_yaml::Value::String(\"image\".into()),\n            serde_yaml::Value::String(\"my-image\".into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"daytona\".into()),\n            serde_yaml::Value::Mapping(daytona),\n        );\n        assert_eq!(config_with(raw).daytona_image(), Some(\"my-image\".to_string()));\n    }\n\n    #[test]\n    fn test_daytona_timeout_default() {\n        assert_eq!(empty_config().daytona_timeout_sec(), 3600);\n    }\n\n    #[test]\n    fn test_daytona_timeout_min_clamp() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut daytona = serde_yaml::Mapping::new();\n        daytona.insert(\n            serde_yaml::Value::String(\"timeout_sec\".into()),\n            serde_yaml::Value::Number(10.into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"daytona\".into()),\n            serde_yaml::Value::Mapping(daytona),\n        );\n        assert_eq!(config_with(raw).daytona_timeout_sec(), 30);\n    }\n\n    #[test]\n    fn test_daytona_env() {\n        std::env::set_var(\"TEST_DAYTONA_ENV\", \"val\");\n        let mut raw = serde_yaml::Mapping::new();\n        let mut daytona = serde_yaml::Mapping::new();\n        let mut env = serde_yaml::Mapping::new();\n        env.insert(\n            serde_yaml::Value::String(\"KEY1\".into()),\n            serde_yaml::Value::String(\"v1\".into()),\n        );\n        env.insert(\n            serde_yaml::Value::String(\"KEY2\".into()),\n            serde_yaml::Value::String(\"$TEST_DAYTONA_ENV\".into()),\n        );\n        daytona.insert(\n            serde_yaml::Value::String(\"env\".into()),\n            serde_yaml::Value::Mapping(env),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"daytona\".into()),\n            serde_yaml::Value::Mapping(daytona),\n        );\n        let map = config_with(raw).daytona_env();\n        assert_eq!(map.get(\"KEY1\"), Some(\u0026\"v1\".to_string()));\n        assert_eq!(map.get(\"KEY2\"), Some(\u0026\"val\".to_string()));\n        std::env::remove_var(\"TEST_DAYTONA_ENV\");\n    }\n\n    #[test]\n    fn test_validate_for_dispatch_ok() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut tracker = serde_yaml::Mapping::new();\n        tracker.insert(\n            serde_yaml::Value::String(\"kind\".into()),\n            serde_yaml::Value::String(\"github\".into()),\n        );\n        tracker.insert(\n            serde_yaml::Value::String(\"api_key\".into()),\n            serde_yaml::Value::String(\"key\".into()),\n        );\n        tracker.insert(\n            serde_yaml::Value::String(\"project_slug\".into()),\n            serde_yaml::Value::String(\"owner/repo\".into()),\n        );\n        tracker.insert(\n            serde_yaml::Value::String(\"project_number\".into()),\n            serde_yaml::Value::Number(1.into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"tracker\".into()),\n            serde_yaml::Value::Mapping(tracker),\n        );\n        let config = config_with(raw);\n        assert!(config.validate_for_dispatch().is_ok());\n    }\n\n    #[test]\n    fn test_validate_missing_tracker_kind() {\n        let config = empty_config();\n        assert!(matches!(\n            config.validate_for_dispatch(),\n rtup terminal workspace cleanup\n    let tracker = Arc::new(GithubTracker::new(\u0026config)?);\n    let terminal_states = config.terminal_states();\n    match tracker.fetch_issues_by_states(\u0026terminal_states).await {\n        Ok(issues) =\u003e {\n            use sympheo::workspace::manager::WorkspaceManager;\n            let wm = WorkspaceManager::new(\u0026config)?;\n            for issue in issues {\n                wm.remove_workspace(\u0026issue.identifier, config.hook_script(\"before_remove\").as_deref())\n                    .await;\n            }\n        }\n        Err(e) =\u003e {\n            warn!(error = %e, \"startup terminal cleanup failed\");\n        }\n    }\n\n    let orchestrator = Arc::new(Orchestrator::new(config.clone(), tracker)?);\n    let state = orchestrator.state.clone();\n\n    // Optional HTTP server\n    if let Some(port) = cli.port {\n        let state_clone = state.clone();\n        tokio::spawn(async move {\n            if let Err(e) = sympheo::server::start_server(port, state_clone).await {\n                warn!(error = %e, \"http server error\");\n            }\n        });\n    }\n\n    // Workflow file watcher\n    let orch_for_watch = orchestrator.clone();\n    let watch_path = workflow_path.clone();\n    tokio::spawn(async move {\n        let (tx, mut rx) = tokio::sync::mpsc::channel(1);\n        let mut watcher = match notify::recommended_watcher(move |res: Result\u003cnotify::Event, notify::Error\u003e| {\n            if let Ok(event) = res {\n                if event.kind.is_modify() {\n                    let _ = tx.try_send(());\n                }\n            }\n        }) {\n            Ok(w) =\u003e w,\n            Err(e) =\u003e {\n                warn!(error = %e, \"failed to create file watcher\");\n                return;\n            }\n        };\n        use notify::Watcher;\n        let _ = watcher.watch(\u0026watch_path, notify::RecursiveMode::NonRecursive);\n        while rx.recv().await.is_some() {\n            tokio::time::sleep(tokio::time::Duration::from_millis(500)).await;\n            let new_workflow = match WorkflowLoader::new(Some(watch_path.clone())).load() {\n                Ok(w) =\u003e w,\n                Err(e) =\u003e {\n                    warn!(error = %e, \"failed to reload workflow\");\n                    continue;\n                }\n            };\n            let new_config = ServiceConfig::new(\n                new_workflow.config,\n                workflow_dir.clone(),\n                new_workflow.prompt_template,\n            );\n            info!(\"workflow reloaded\");\n            orch_for_watch.reload_config(new_config).await;\n        }\n    });\n\n    // Main loop\n    let mut interval = tokio::time::interval(tokio::time::Duration::from_millis(config.poll_interval_ms()));\n    interval.tick().await; // first tick immediate-ish\n\n    loop {\n        interval.tick().await;\n        let cfg = orchestrator.config.read().await.clone();\n        interval = tokio::time::interval(tokio::time::Duration::from_millis(cfg.poll_interval_ms()));\n        orchestrator.tick().await;\n        orchestrator.process_retries().await;\n    }\n}\n","traces":[{"line":56,"address":[12080645,12080160,12080651],"length":1,"stats":{"Line":0}},{"line":57,"address":[11987396],"length":1,"stats":{"Line":0}},{"line":59,"address":[11987695,11987819],"length":1,"stats":{"Line":0}},{"line":60,"address":[11987746,11987781,11987827,11987714,11993336],"length":1,"stats":{"Line":0}},{"line":61,"address":[11987870],"length":1,"stats":{"Line":0}},{"line":65,"address":[11988018],"length":1,"stats":{"Line":0}},{"line":66,"address":[12012960,12012972,11988033],"length":1,"stats":{"Line":0}},{"line":67,"address":[11988395,11988093],"length":1,"stats":{"Line":0}},{"line":69,"address":[11988256],"length":1,"stats":{"Line":0}},{"line":71,"address":[12013048,12013008,11988385,11988402],"length":1,"stats":{"Line":0}},{"line":73,"address":[11988517,11988439],"length":1,"stats":{"
