ive(Debug, Clone)]\npub struct OrchestratorState {\n    pub poll_interval_ms: u64,\n    pub max_concurrent_agents: usize,\n    pub running: HashMap\u003cString, RunningEntry\u003e,\n    pub claimed: HashSet\u003cString\u003e,\n    pub retry_attempts: HashMap\u003cString, RetryEntry\u003e,\n    pub completed: HashSet\u003cString\u003e,\n    pub codex_totals: TokenTotals,\n    pub codex_rate_limits: Option\u003cserde_json::Value\u003e,\n}\n\nimpl OrchestratorState {\n    pub fn new(poll_interval_ms: u64, max_concurrent_agents: usize) -\u003e Self {\n        Self {\n            poll_interval_ms,\n            max_concurrent_agents,\n            running: HashMap::new(),\n            claimed: HashSet::new(),\n            retry_attempts: HashMap::new(),\n            completed: HashSet::new(),\n            codex_totals: TokenTotals::default(),\n            codex_rate_limits: None,\n        }\n    }\n\n    pub fn available_slots(\u0026self, _per_state: \u0026HashMap\u003cString, usize\u003e) -\u003e usize {\n        let global = self.max_concurrent_agents.saturating_sub(self.running.len());\n        // For simplicity, global limit is the primary constraint.\n        // Per-state limits would require counting running issues by state.\n        global\n    }\n\n    pub fn count_running_by_state(\u0026self, state: \u0026str) -\u003e usize {\n        let needle = state.to_lowercase();\n        self.running\n            .values()\n            .filter(|e| e.issue.state.to_lowercase() == needle)\n            .count()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_state_new() {\n        let state = OrchestratorState::new(5000, 5);\n        assert_eq!(state.poll_interval_ms, 5000);\n        assert_eq!(state.max_concurrent_agents, 5);\n        assert!(state.running.is_empty());\n        assert!(state.claimed.is_empty());\n        assert!(state.retry_attempts.is_empty());\n        assert!(state.completed.is_empty());\n        assert_eq!(state.codex_totals.input_tokens, 0);\n        assert!(state.codex_rate_limits.is_none());\n    }\n\n    #[test]\n    fn test_available_slots() {\n        let mut state = OrchestratorState::new(10000, 3);\n        assert_eq!(state.available_slots(\u0026HashMap::new()), 3);\n\n        state.running.insert(\n            \"1\".into(),\n            RunningEntry {\n                issue: Issue {\n                    id: \"1\".into(),\n                    identifier: \"TEST-1\".into(),\n                    title: \"a\".into(),\n                    description: None,\n                    priority: None,\n                    state: \"todo\".into(),\n                    branch_name: None,\n                    url: None,\n                    labels: vec![],\n                    blocked_by: vec![],\n                    created_at: None,\n                    updated_at: None,\n                },\n                session: None,\n                started_at: chrono::Utc::now(),\n                retry_attempt: None,\n                turn_count: 0,\n                cancelled: Arc::new(AtomicBool::new(false)),\n            },\n        );\n        assert_eq!(state.available_slots(\u0026HashMap::new()), 2);\n    }\n\n    #[test]\n    fn test_available_slots_saturating() {\n        let mut state = OrchestratorState::new(10000, 1);\n        state.running.insert(\n            \"1\".into(),\n            RunningEntry {\n                issue: Issue {\n                    id: \"1\".into(),\n                    identifier: \"TEST-1\".into(),\n                    title: \"a\".into(),\n                    description: None,\n                    priority: None,\n                    state: \"todo\".into(),\n                    branch_name: None,\n                    url: None,\n                    labels: vec![],\n                    blocked_by: vec![],\n                    created_at: None,\n                    updated_at: None,\n                },\n                session: None,\n                started_at: chrono::Utc::now(),\n                retry_attempt: None,\n                turn_count: 0,\n                cancelled: Arc::new(AtomicBool::new(false)),\n            },\n        );\n        assert_eq!(state.available_slots(\u0026HashMap::new()), 0);\n    }\n\n    #[test]\n    fn test_count_running_by_state() {\n        let mut state = OrchestratorState::new(10000, 10);\n        for (id, st) in [(\"1\", \"todo\"), (\"2\", \"in progress\"), (\"3\", \"todo\")] {\n            state.running.insert(\n                id.into(),\n                RunningEntry {\n                    issue: Issue {\n                        id: id.into(),\n                        identifier: format!(\"TEST-{id}\"),\n                        title: \"a\".into(),\n                        description: None,\n                        priority: None,\n                        state: st.into(),\n                        branch_name: None,\n                        url: None,\n                        labels: vec![],\n                        blocked_by: vec![],\n                        created_at: None,\n                        updated_at: None,\n                    },\n                    session: None,\n                    started_at: chrono::Utc::now(),\n                    retry_attempt: None,\n                    turn_count: 0,\n                    cancelled: Arc::new(AtomicBool::new(false)),\n                },\n            );\n        }\n        assert_eq!(state.count_running_by_state(\"todo\"), 2);\n        assert_eq!(state.count_running_by_state(\"in progress\"), 1);\n        assert_eq!(state.count_running_by_state(\"closed\"), 0);\n    }\n\n    #[test]\n    fn test_running_entry_is_cancelled() {\n        let entry = RunningEntry {\n            issue: Issue {\n                id: \"1\".into(),\n                identifier: \"TEST-1\".into(),\n                title: \"a\".into(),\n                description: None,\n                priority: None,\n                state: \"todo\".into(),\n                branch_name: None,\n                url: None,\n                labels: vec![],\n                blocked_by: vec![],\n                created_at: None,\n                updated_at: None,\n            },\n            session: None,\n            started_at: chrono::Utc::now(),\n            retry_attempt: None,\n            turn_count: 0,\n            cancelled: Arc::new(AtomicBool::new(false)),\n        };\n        assert!(!entry.is_cancelled());\n        entry.cancelled.store(true, Ordering::Relaxed);\n        assert!(entry.is_cancelled());\n    }\n}\n","traces":[{"line":17,"address":[12225376],"length":1,"stats":{"Line":1}},{"line":18,"address":[14741941],"length":1,"stats":{"Line":1}},{"line":35,"address":[12007896,12007344,12007902],"length":1,"stats":{"Line":16}},{"line":39,"address":[14742283],"length":1,"stats":{"Line":17}},{"line":40,"address":[12122089],"length":1,"stats":{"Line":18}},{"line":41,"address":[12122146],"length":1,"stats":{"Line":18}},{"line":42,"address":[12225851],"length":1,"stats":{"Line":18}},{"line":43,"address":[14742479],"length":1,"stats":{"Line":20}},{"line":48,"address":[11610016],"length":1,"stats":{"Line":4}},{"line":49,"address":[12007086],"length":1,"stats":{"Line":3}},{"line":55,"address":[14742032,14742220,14742214],"length":1,"stats":{"Line":3}},{"line":56,"address":[12225508],"length":1,"stats":{"Line":2}},{"line":57,"address":[13842151],"length":1,"stats":{"Line":3}},{"line":59,"address":[12225585],"length":1,"stats":{"Line":4}}],"covered":14,"coverable":14},{"path":["/","home","supergeoff","projects","sympheo","src","orchestrator","tick.rs"],"content":"use crate::agent::runner::AgentRunner;\nuse crate::config::typed::ServiceConfig;\nuse crate::error::SympheoError;\nuse crate::orchestrator::retry::schedule_retry;\nuse crate::orchestrator::state::{OrchestratorState, RunningEntry};\nuse crate::tracker::model::{Issue, LiveSession};\nuse crate::tracker::IssueTracker;\nuse crate::workspace::manager::WorkspaceManager;\nuse chrono::Utc;\nuse std::sync::atomic::{AtomicBool, Ordering};\nuse std::sync::Arc;\nuse tokio::sync::RwLock;\nuse tracing::{error, info, warn};\n\npub struct Orchestrator {\n    pub state: Arc\u003cRwLock\u003cOrchestratorState\u003e\u003e,\n    pub config: Arc\u003cRwLock\u003cServiceConfig\u003e\u003e,\n    tracker: Arc\u003cdyn IssueTracker\u003e,\n    runner: Arc\u003cAgentRunner\u003e,\n    workspace_manager: Arc\u003cWorkspaceManager\u003e,\n}\n\nimpl Orchestrator {\n    pub fn new(\n        config: ServiceConfig,\n        tracker: Arc\u003cdyn IssueTracker\u003e,\n    ) -\u003e Result\u003cSelf, SympheoError\u003e {\n        let state = OrchestratorState::new(\n            config.poll_interval_ms(),\n            config.max_concurrent_agents(),\n        );\n        let workspace_manager = WorkspaceManager::new(\u0026config)?;\n        let runner = AgentRunner::new(\u0026config)?;\n        Ok(Self {\n            state: Arc::new(RwLock::new(state)),\n            config: Arc::new(RwLock::new(config)),\n            tracker,\n            runner: Arc::new(runner),\n            workspace_manager: Arc::new(workspace_manager),\n        })\n    }\n\n    pub async fn reload_config(\u0026self, config: ServiceConfig) {\n        let mut state = self.state.write().await;\n        state.poll_interval_ms = config.poll_interval_ms();\n        state.max_concurrent_agents = config.max_concurrent_agents();\n        *self.config.write().await = config;\n    }\n\n    pub async fn tick(\u0026self) {\n        info!(\"orchestrator tick start\");\n\n        // Part A: Reconcile\n        if let Err(e) = self.reconcile().await {\n            warn!(error = %e, \"reconciliation failed\");\n        }\n\n        // Preflight validation\n        let config = self.config.read().await.clone();\n        if let Err(e) = config.validate_for_dispatch() {\n            warn!(error = %e, \"dispatch validation failed, skipping dispatch\");\n            return;\n        }\n\n        // Fetch candidates\n        let candidates = match self.tracker.fetch_candidate_issues().await {\n            Ok(issues) =\u003e issues,\n            Err(e) =\u003e {\n                warn!(error = %e, \"candidate fetch failed\");\n                return;\n            }\n        };\n\n        let active_states = config.active_states();\n        let terminal_states = config.terminal_states();\n        let max_turns = config.max_turns();\n        let per_state_limits = config.max_concurrent_agents_by_state();\n\n        let mut eligible: Vec\u003cIssue\u003e = candidates\n            .into_iter()\n            .filter(|i| {\n                let state_lc = i.state.to_lowercase();\n                active_states.contains(\u0026state_lc) \u0026\u0026 !terminal_states.contains(\u0026state_lc)\n            })\n            .filter(|i| {\n                let state_lc = i.state.to_lowercase();\n                if state_lc == \"todo\" {\n                    !i.is_blocked(\u0026terminal_states)\n                } else {\n                    true\n                }\n            })\n            .collect();\n\n        // Sort by priority asc, created_at asc, identifier asc\n        eligible.sort_by(|a, b| {\n            a.priority\n                .unwrap_or(i32::MAX)\n                .cmp(\u0026b.priority.unwrap_or(i32::MAX))\n                .then_with(|| a.created_at.cmp(\u0026b.created_at))\n                .then_with(|| a.identifier.cmp(\u0026b.identifier))\n        });\n\n        let mut state = self.state.write().await;\n        for issue in eligible {\n            if state.available_slots(\u0026per_state_limits) == 0 {\n                break;\n            }\n            if state.running.contains_key(\u0026issue.id) || state.claimed.contains(\u0026issue.id) {\n                continue;\n            }\n\n            let state_limit = per_state_limits\n                .get(\u0026issue.state.to_lowercase())\n                .copied()\n                .unwrap_or(state.max_concurrent_agents);\n            if state.count_running_by_state(\u0026issue.state) \u003e= state_limit {\n                continue;\n            }\n\n            // Dispatch\n            let issue_id = issue.id.clone();\n            let cancelled = Arc::new(AtomicBool::new(false));\n            state.claimed.insert(issue_id.clone());\n            state.running.insert(\n                issue_id.clone(),\n                RunningEntry {\n                    issue: issue.clone(),\n                    session: None,\n                    started_at: Utc::now(),\n                    retry_attempt: None,\n                    turn_count: 0,\n                    cancelled: cancelled.clone(),\n                },\n            );\n            drop(state); // release lock before spawning\n\n            self.spawn_worker(issue, None, max_turns, cancelled);\n\n            state = self.state.write().await;\n        }\n\n        info!(\"orchestrator tick end\");\n    }\n\n    async fn reconcile(\u0026self) -\u003e Result\u003c(), SympheoError\u003e {\n        let running_ids: Vec\u003cString\u003e = {\n            let state = self.state.read().await;\n            state.running.keys().cloned().collect()\n        };\n\n        if running_ids.is_empty() {\n            return Ok(());\n        }\n\n        let config = self.config.read().await.clone();\n        let stall_timeout_ms = config.codex_stall_timeout_ms();\n\n        // Stall detection\n        let now = Utc::now();\n        let mut to_kill = vec![];\n        {\n            let state = self.state.read().await;\n            for (id, entry) in \u0026state.running {\n                if stall_timeout_ms \u003c= 0 {\n                    continue;\n                }\n                let elapsed = if let Some(ref sess) = entry.session {\n                    if let Some(ts) = sess.last_timestamp {\n                        (now - ts).num_milliseconds() as u64\n                    } else {\n                        (now - entry.started_at).num_milliseconds() as u64\n                    }\n                } else {\n                    (now - entry.started_at).num_milliseconds() as u64\n                };\n                if elapsed \u003e stall_timeout_ms as u64 {\n                    to_kill.push(id.clone());\n                }\n            }\n        }\n\n        for id in to_kill {\n            warn!(issue_id = %id, \"stall detected, terminating\");\n            self.handle_worker_exit(\u0026id, false, Some(\"stalled\".into())).await;\n        }\n\n        // Tracker state refresh\n        let refreshed = self\n            .tracker\n            .fetch_issue_states_by_ids(\u0026running_ids)\n            .await?;\n\n        let active_states = config.active_states();\n        let terminal_states = config.terminal_states();\n\n        let mut state = self.state.write().await;\n        for issue in refreshed {\n            let state_lc = issue.state.to_lowercase();\n            if terminal_states.contains(\u0026state_lc) {\n                if let Some(entry) = state.running.get(\u0026issue.id) {\n                    entry.cancelled.store(true, Ordering::Relaxed);\n                }\n                if let Some(entry) = state.running.remove(\u0026issue.id) {\n                    state.claimed.remove(\u0026issue.id);\n                    drop(state);\n                    self.workspace_manager\n                        .remove_workspace(\u0026entry.issue.identifier, config.hook_script(\"before_remove\").as_deref())\n                        .await;\n                    state = self.state.write().await;\n                }\n            } else if active_states.contains(\u0026state_lc) {\n                if let Some(entry) = state.running.get_mut(\u0026issue.id) {\n                    entry.issue = issue;\n                }\n            } else {\n                if let Some(entry) = state.running.get(\u0026issue.id) {\n                    entry.cancelled.store(true, Ordering::Relaxed);\n                }\n                if state.running.remove(\u0026issue.id).is_some() {\n                    state.claimed.remove(\u0026issue.id);\n                }\n            }\n        }\n\n        Ok(())\n    }\n\n    fn spawn_worker(\u0026self, issue: Issue, attempt: Option\u003cu32\u003e, max_turns: u32, cancelled: Arc\u003cAtomicBool\u003e) {\n        let state = self.state.clone();\n        let config = self.config.clone();\n        let runner = self.runner.clone();\n        let tracker = self.tracker.clone();\n        let workspace_manager = self.workspace_manager.clone();\n\n        tokio::spawn(async move {\n            let cfg = config.read().await.clone();\n            let result = run_worker(\n                issue.clone(),\n                attempt,\n                max_turns,\n                \u0026cfg,\n                runner.as_ref(),\n                tracker.as_ref(),\n                workspace_manager.as_ref(),\n                state.clone(),\n                cancelled,\n            )\n            .await;\n\n            let mut st = state.write().await;\n            // Accumulate runtime for the finished session\n            if let Some(entry) = st.running.get(\u0026issue.id) {\n                let elapsed = (Utc::now() - entry.started_at).num_seconds() as f64;\n                st.codex_totals.seconds_running += elapsed;\n            }\n            match result {\n                Ok(()) =\u003e {\n                    info!(issue_id = %issue.id, \"worker exited normally\");\n                    if let Some(entry) = st.running.remove(\u0026issue.id) {\n                        st.completed.insert(issue.id.clone());\n                        let retry = schedule_retry(\n                            issue.id.clone(),\n                            entry.issue.identifier.clone(),\n                            1,\n                            None,\n                            \u0026cfg,\n                            true,\n                        );\n                        st.retry_attempts.insert(issue.id.clone(), retry);\n                    }\n                }\n                Err(e) =\u003e {\n                    error!(issue_id = %issue.id, error = %e, \"worker failed\");\n                    if let Some(entry) = st.running.remove(\u0026issue.id) {\n                        let next_attempt = attempt.unwrap_or(0) + 1;\n                        let retry = schedule_retry(\n                            issue.id.clone(),\n                            entry.issue.identifier.clone(),\n                            next_attempt,\n                            Some(e.to_string()),\n                            \u0026cfg,\n                            false,\n                        );\n                        st.retry_attempts.insert(issue.id.clone(), retry);\n                    }\n                }\n            }\n        });\n    }\n\n    pub async fn handle_worker_exit(\n        \u0026self,\n        issue_id: \u0026str,\n        normal: bool,\n        error: Option\u003cString\u003e,\n    ) {\n        let mut state = self.state.write().await;\n        let cfg = self.config.read().await.clone();\n        if let Some(entry) = state.running.remove(issue_id) {\n            let elapsed = (Utc::now() - entry.started_at).num_seconds() as f64;\n            state.codex_totals.seconds_running += elapsed;\n            if normal {\n                state.completed.insert(issue_id.to_string());\n                let retry = schedule_retry(\n                    issue_id.to_string(),\n                    entry.issue.identifier.clone(),\n                    1,\n                    None,\n                    \u0026cfg,\n                    true,\n                );\n                state.retry_attempts.insert(issue_id.to_string(), retry);\n            } else {\n                let next_attempt = entry.retry_attempt.unwrap_or(0) + 1;\n                let retry = schedule_retry(\n                    issue_id.to_string(),\n                    entry.issue.identifier.clone(),\n                    next_attempt,\n                    error,\n                    \u0026cfg,\n                    false,\n                );\n                state.retry_attempts.insert(issue_id.to_string(), retry);\n            }\n        }\n    }\n\n    pub async fn process_retries(\u0026self) {\n        let now = Instant::now();\n        let due: Vec\u003c(String, crate::tracker::model::RetryEntry)\u003e = {\n            let state = self.state.read().await;\n            state\n                .retry_attempts\n                .iter()\n                .filter(|(_, entry)| entry.due_at \u003c= now)\n                .map(|(k, v)| (k.clone(), v.clone()))\n                .collect()\n        };\n\n        for (issue_id, retry) in due {\n            let mut state = self.state.write().await;\n            state.retry_attempts.remove(\u0026issue_id);\n            drop(state);\n\n            let candidates = match self.tracker.fetch_candidate_issues().await {\n                Ok(c) =\u003e c,\n                Err(e) =\u003e {\n                    warn!(issue_id = %issue_id, error = %e, \"retry candidate fetch failed, requeuing\");\n                    let config = self.config.read().await.clone();\n                    let new_retry = schedule_retry(\n                        issue_id.clone(),\n                        retry.identifier.clone(),\n                        retry.attempt + 1,\n                        Some(\"retry poll failed\".into()),\n                        \u0026config,\n                        false,\n                    );\n                    let mut st = self.state.write().await;\n                    st.retry_attempts.insert(issue_id, new_retry);\n                    continue;\n                }\n            };\n\n            let config = self.config.read().await.clone();\n            if let Some(issue) = candidates.into_iter().find(|i| i.id == issue_id) {\n                let active = config.active_states();\n                let terminal = config.terminal_states();\n                let state_lc = issue.state.to_lowercase();\n                if terminal.contains(\u0026state_lc) || !active.contains(\u0026state_lc) {\n                    let mut st = self.state.write().await;\n                    st.claimed.remove(\u0026issue_id);\n                    continue;\n                }\n\n                let mut st = self.state.write().await;\n                if st.available_slots(\u0026config.max_concurrent_agents_by_state()) == 0 {\n                    let new_retry = schedule_retry(\n                        issue_id.clone(),\n                        issue.identifier.clone(),\n                        retry.attempt,\n                        Some(\"no available orchestrator slots\".into()),\n                        \u0026config,\n                        false,\n                    );\n                    st.retry_attempts.insert(issue_id, new_retry);\n                    continue;\n                }\n                let cancelled = Arc::new(AtomicBool::new(false));\n                st.claimed.insert(issue_id.clone());\n                st.running.insert(\n                    issue_id.clone(),\n                    RunningEntry {\n                        issue: issue.clone(),\n                        session: None,\n                        started_at: Utc::now(),\n                        retry_attempt: Some(retry.attempt),\n                        turn_count: 0,\n                        cancelled: cancelled.clone(),\n                    },\n                );\n                drop(st);\n                self.spawn_worker(issue, Some(retry.attempt), config.max_turns(), cancelled);\n            } else {\n                let mut st = self.state.write().await;\n                st.claimed.remove(\u0026issue_id);\n            }\n        }\n    }\n}\n\nuse std::time::Instant;\n\n#[allow(clippy::too_many_arguments)]\nasync fn run_worker(\n    issue: Issue,\n    attempt: Option\u003cu32\u003e,\n    max_turns: u32,\n    config: \u0026ServiceConfig,\n    runner: \u0026AgentRunner,\n    tracker: \u0026dyn IssueTracker,\n    workspace_manager: \u0026WorkspaceManager,\n    state: Arc\u003cRwLock\u003cOrchestratorState\u003e\u003e,\n    cancelled: Arc\u003cAtomicBool\u003e,\n) -\u003e Result\u003c(), SympheoError\u003e {\n    let workspace = workspace_manager\n        .create_or_reuse(\n            \u0026issue.identifier,\n            config.hook_script(\"after_create\").as_deref(),\n        )\n        .await?;\n\n    if let Some(script) = config.hook_script(\"before_run\") {\n        workspace_manager\n            .run_hook(\"before_run\", \u0026script, \u0026workspace.path)\n            .await?;\n    }\n\n    let mut current_session: Option\u003cString\u003e = None;\n    let mut turn_number = 1;\n\n    loop {\n        if cancelled.load(Ordering::Relaxed) {\n            info!(issue_id = %issue.id, \"worker cancelled by orchestrator, stopping\");\n            break;\n        }\n\n        let prompt = if turn_number == 1 {\n            build_prompt(config, \u0026issue, attempt)?\n        } else {\n            \"Continue working on the current task. Review the conversation history and proceed with the next step.\".to_string()\n        };\n\n        let turn_result = runner\n            .run_turn(\u0026issue, \u0026prompt, current_session.as_deref(), \u0026workspace.path)\n            .await?;\n\n        // Update orchestrator state with session metadata and tokens\n        {\n            let mut st = state.write().await;\n            if let Some(entry) = st.running.get_mut(\u0026issue.id) {\n                entry.turn_count += 1;\n                entry.session = Some(LiveSession {\n                    session_id: format!(\"{}-{}\", turn_result.session_id, turn_result.turn_id),\n                    thread_id: turn_result.session_id.clone(),\n                    turn_id: turn_result.turn_id.clone(),\n                    agent_pid: None,\n                    last_event: Some(\"turn_completed\".into()),\n                    last_timestamp: Some(Utc::now()),\n                    last_message: Some(turn_result.text.clone()),\n                    input_tokens: turn_result.tokens.as_ref().map(|t| t.input).unwrap_or(0),\n                    output_tokens: turn_result.tokens.as_ref().map(|t| t.output).unwrap_or(0),\n                    total_tokens: turn_result.tokens.as_ref().map(|t| t.total).unwrap_or(0),\n                    last_reported_input_tokens: turn_result.tokens.as_ref().map(|t| t.input).unwrap_or(0),\n                    last_reported_output_tokens: turn_result.tokens.as_ref().map(|t| t.output).unwrap_or(0),\n                    last_reported_total_tokens: turn_result.tokens.as_ref().map(|t| t.total).unwrap_or(0),\n                    turn_count: entry.turn_count,\n                });\n                if let Some(ref tokens) = turn_result.tokens {\n                    st.codex_totals.input_tokens += tokens.input;\n                    st.codex_totals.output_tokens += tokens.output;\n                    st.codex_totals.total_tokens += tokens.total;\n                }\n            }\n        }\n\n        if !turn_result.success {\n            return Err(SympheoError::AgentRunnerError(\n                \"turn reported failure\".into(),\n            ));\n        }\n\n        current_session = Some(turn_result.session_id);\n\n        // Refresh issue state\n        let refreshed = tracker\n            .fetch_issue_states_by_ids(std::slice::from_ref(\u0026issue.id))\n            .await?;\n        let active_states = config.active_states();\n        let terminal_states = config.terminal_states();\n\n        if let Some(refreshed_issue) = refreshed.into_iter().next() {\n            let state_lc = refreshed_issue.state.to_lowercase();\n            if terminal_states.contains(\u0026state_lc) || !active_states.contains(\u0026state_lc) {\n                break;\n            }\n        }\n\n        if turn_number \u003e= max_turns {\n            break;\n        }\n        turn_number += 1;\n    }\n\n    if let Some(script) = config.hook_script(\"after_run\") {\n        if let Err(e) = workspace_manager.run_hook(\"after_run\", \u0026script, \u0026workspace.path).await {\n            warn!(error = %e, \"after_run hook failed\");\n        }\n    }\n\n    Ok(())\n}\n\nfn build_prompt(\n    config: \u0026ServiceConfig,\n    issue: \u0026Issue,\n    attempt: Option\u003cu32\u003e,\n) -\u003e Result\u003cString, SympheoError\u003e {\n    use liquid::model::Value;\n    use std::collections::HashMap;\n\n    let template_str = if config.prompt_template.is_empty() {\n        \"You are working on an issue from the tracker.\".to_string()\n    } else {\n        config.prompt_template.clone()\n    };\n\n    let template = liquid::ParserBuilder::with_stdlib()\n        .build()\n        .map_err(|e| SympheoError::TemplateParseError(e.to_string()))?\n        .parse(\u0026template_str)\n        .map_err(|e| SympheoError::TemplateParseError(e.to_string()))?;\n\n    let mut globals = HashMap::new();\n    let issue_map = serde_json::to_value(issue).map_err(|e| SympheoError::TemplateRenderError(e.to_string()))?;\n    let mut obj = liquid::model::Object::new();\n    for (k, v) in issue_map.as_object().unwrap() {\n        obj.insert(kstring::KString::from_ref(k), serde_json_to_liquid(v));\n    }\n    globals.insert(\"issue\".to_string(), Value::Object(obj));\n    if let Some(a) = attempt {\n        globals.insert(\"attempt\".to_string(), Value::Scalar(a.into()));\n    }\n\n    let output = template\n        .render(\u0026globals)\n        .map_err(|e| SympheoError::TemplateRenderError(e.to_string()))?;\n    Ok(output)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::path::PathBuf;\n\n    #[test]\n    fn test_build_prompt_with_template() {\n        let mut raw = serde_yaml::Mapping::new();\n        raw.insert(\n            serde_yaml::Value::String(\"tracker\".into()),\n            serde_yaml::Value::Mapping(serde_yaml::Mapping::new()),\n        );\n        let config = S at!(\n        \"\u003chtml\u003e\u003cbody\u003e\u003ch1\u003eSymphony\u003c/h1\u003e\u003cp\u003eRunning: {}\u003c/p\u003e\u003cp\u003eRetrying: {}\u003c/p\u003e\u003c/body\u003e\u003c/html\u003e\",\n        st.running.len(),\n        st.retry_attempts.len()\n    );\n    (StatusCode::OK, html)\n}\n\nasync fn api_state(State(state): State\u003cSharedState\u003e) -\u003e Json\u003cserde_json::Value\u003e {\n    let st = state.read().await;\n    let now = chrono::Utc::now().to_rfc3339();\n    let running: Vec\u003cserde_json::Value\u003e = st\n        .running\n        .values()\n        .map(|e| {\n            json!({\n                \"issue_id\": e.issue.id,\n                \"issue_identifier\": e.issue.identifier,\n                \"state\": e.issue.state,\n                \"session_id\": e.session.as_ref().map(|s| s.session_id.clone()).unwrap_or_default(),\n                \"turn_count\": e.turn_count,\n                \"started_at\": e.started_at.to_rfc3339(),\n            })\n        })\n        .collect();\n    let retrying: Vec\u003cserde_json::Value\u003e = st\n        .retry_attempts\n        .values()\n        .map(|r| {\n            json!({\n                \"issue_id\": r.issue_id,\n                \"issue_identifier\": r.identifier,\n                \"attempt\": r.attempt,\n                \"error\": r.error,\n            })\n        })\n        .collect();\n    Json(json!({\n        \"generated_at\": now,\n        \"counts\": {\n            \"running\": st.running.len(),\n            \"retrying\": st.retry_attempts.len()\n        },\n        \"running\": running,\n        \"retrying\": retrying,\n        \"codex_totals\": {\n            \"input_tokens\": st.codex_totals.input_tokens,\n            \"output_tokens\": st.codex_totals.output_tokens,\n            \"total_tokens\": st.codex_totals.total_tokens,\n            \"seconds_running\": st.codex_totals.seconds_running,\n        },\n        \"rate_limits\": st.codex_rate_limits,\n    }))\n}\n\nasync fn api_refresh(State(_state): State\u003cSharedState\u003e) -\u003e Json\u003cserde_json::Value\u003e {\n    Json(json!({\n        \"queued\": true,\n        \"coalesced\": false,\n        \"requested_at\": chrono::Utc::now().to_rfc3339(),\n        \"operations\": [\"poll\", \"reconcile\"]\n    }))\n}\n\nasync fn api_issue(\n    State(state): State\u003cSharedState\u003e,\n    AxumPath(issue_identifier): AxumPath\u003cString\u003e,\n) -\u003e Result\u003cJson\u003cserde_json::Value\u003e, StatusCode\u003e {\n    let st = state.read().await;\n    let entry = st\n        .running\n        .values()\n        .find(|e| e.issue.identifier == issue_identifier);\n    if let Some(entry) = entry {\n        Ok(Json(json!({\n            \"issue_identifier\": entry.issue.identifier,\n            \"issue_id\": entry.issue.id,\n            \"status\": \"running\",\n            \"started_at\": entry.started_at.to_rfc3339(),\n            \"turn_count\": entry.turn_count,\n        })))\n    } else {\n        Err(StatusCode::NOT_FOUND)\n    }\n}\n","traces":[{"line":15,"address":[15118208,15118192],"length":1,"stats":{"Line":5}},{"line":16,"address":[11510131,11509691,11509537,11509391,11509241,11509845,11509929,11509621,11510027,11509775,11509467],"length":1,"stats":{"Line":11}},{"line":17,"address":[11730759,11729543,11729570,11729627,11729689,11730722,11729468],"length":1,"stats":{"Line":3}},{"line":18,"address":[11626057,11626133,11627026,11627082,11626076,11627055,11626195,11625828],"length":1,"stats":{"Line":3}},{"line":19,"address":[11627090,11626287,11626349,11627007,11626230,11626211,11626986,11625836,11627034],"length":1,"stats":{"Line":3}},{"line":20,"address":[11207328,11207872,11207385,11207914,11207958,11207321,11208010,11206816],"length":1,"stats":{"Line":2}},{"line":21,"address":[13371063,13371039,13371158],"length":1,"stats":{"Line":3}},{"line":23,"address":[13372071,13371909,13371984,13371162,13373886,13371846,13371420,13371242],"length":1,"stats":{"Line":6}},{"line ,{"path":["/","home","supergeoff","projects","sympheo","src","tracker","github.rs"],"content":"use crate::config::typed::ServiceConfig;\nuse crate::error::SympheoError;\nuse crate::tracker::model::Issue;\nuse crate::tracker::IssueTracker;\nuse async_trait::async_trait;\nuse chrono::{DateTime, Utc};\nuse reqwest::header::{ACCEPT, AUTHORIZATION, HeaderMap, HeaderValue, USER_AGENT};\nuse serde_json::json;\n\npub struct GithubTracker {\n    client: reqwest::Client,\n    owner: String,\n    repo: String,\n    project_number: i64,\n    endpoint: String,\n}\n\nimpl GithubTracker {\n    pub fn new(config: \u0026ServiceConfig) -\u003e Result\u003cSelf, SympheoError\u003e {\n        let api_key = config\n            .tracker_api_key()\n            .ok_or(SympheoError::MissingTrackerApiKey)?;\n        let project = config\n            .tracker_project_slug()\n            .ok_or(SympheoError::MissingTrackerProjectSlug)?;\n        let project_number = config\n            .tracker_project_number()\n            .ok_or_else(|| SympheoError::InvalidConfiguration(\n                \"tracker.project_number is required for github projects\".into(),\n            ))?;\n        let parts: Vec\u003c\u0026str\u003e = project.split('/').collect();\n        if parts.len() != 2 {\n            return Err(SympheoError::InvalidConfiguration(\n                \"tracker.project_slug must be owner/repo\".into(),\n            ));\n        }\n        let mut headers = HeaderMap::new();\n        let auth = HeaderValue::from_str(\u0026format!(\"Bearer {api_key}\"))\n            .map_err(|e| SympheoError::InvalidConfiguration(e.to_string()))?;\n        headers.insert(AUTHORIZATION, auth);\n        headers.insert(\n            USER_AGENT,\n            HeaderValue::from_static(\"sympheo/0.1.0\"),\n        );\n        headers.insert(\n            ACCEPT,\n            HeaderValue::from_static(\"application/vnd.github+json\"),\n        );\n        let client = reqwest::Client::builder()\n            .default_headers(headers)\n            .timeout(std::time::Duration::from_secs(30))\n            .build()\n            .map_err(|e| SympheoError::TrackerApiRequest(e.to_string()))?;\n        Ok(Self {\n            client,\n            owner: parts[0].to_string(),\n            repo: parts[1].to_string(),\n            project_number,\n            endpoint: config.tracker_endpoint(),\n        })\n    }\n\n    async fn graphql_query(\n        \u0026self,\n        query: \u0026str,\n        variables: serde_json::Value,\n    ) -\u003e Result\u003cserde_json::Value, SympheoError\u003e {\n        let body = json!({ \"query\": query, \"variables\": variables });\n        let resp = self\n            .client\n            .post(format!(\"{}/graphql\", self.endpoint))\n            .json(\u0026body)\n            .send()\n            .await\n            .map_err(|e| SympheoError::TrackerApiRequest(e.to_string()))?;\n        let status = resp.status();\n        let json: serde_json::Value = resp\n            .json()\n            .await\n            .map_err(|e| SympheoError::TrackerMalformedPayload(e.to_string()))?;\n        if let Some(errors) = json.get(\"errors\") {\n            return Err(SympheoError::TrackerApiStatus(format!(\n                \"GraphQL errors: {}\",\n                errors\n            )));\n        }\n        if !status.is_success() {\n            return Err(SympheoError::TrackerApiStatus(format!(\n                \"HTTP {}: {}\",\n                status, json\n            )));\n        }\n        Ok(json[\"data\"].clone())\n    }\n\n    async fn fetch_project_items(\u0026self) -\u003e Result\u003cVec\u003cserde_json::Value\u003e, SympheoError\u003e {\n        // Determine if owner is an organization or a user\n        let org_query = r#\"\n            query($owner: String!, $projectNumber: Int!) {\n              organization(login: $owner) {\n                projectV2(number: $projectNumber) { id }\n              }\n            }\n        \"#;\n        let is_org = match self\n            .graphql_query(org_query, json!({\"owner\": \u0026self.owner, \"projectNumber\": self.project_number}))\n            .await\n        {\n            Ok(org_data) =\u003e org_data\n                .get(\"organization\")\n                .and_then(|o| o.get(\"projectV2\"))\n                .is_some(),\n            Err(_) =\u003e false, // Not an org (or project doesn't exist on org), try user\n        };\n\n        let query_template = if is_org {\n            r#\"\n            query($owner: String!, $projectNumber: Int!, $first: Int!, $after: String) {\n              organization(login: $owner) {\n                projectV2(number: $projectNumber) {\n                  items(first: $first, after: $after) {\n                    nodes {\n                      id\n                      content {\n                        ... on Issue {\n                          id\n                          number\n                          title\n                          body\n                          state\n                          labels(first: 10) { nodes { name } }\n                          createdAt\n                          updatedAt\n                          url\n                          repository { name owner { login } }\n                        }\n                      }\n                      fieldValues(first: 20) {\n                        nodes {\n                          ... on ProjectV2ItemFieldSingleSelectValue {\n                            field { ... on ProjectV2FieldCommon { name } }\n                            name\n                          }\n                        }\n                      }\n                    }\n                    pageInfo { hasNextPage endCursor }\n                  }\n                }\n              }\n            }\n            \"#\n        } else {\n            r#\"\n            query($owner: String!, $projectNumber: Int!, $first: Int!, $after: String) {\n              user(login: $owner) {\n                projectV2(number: $projectNumber) {\n                  items(first: $first, after: $after) {\n                    nodes {\n                      id\n                      content {\n                        ... on Issue {\n                          id\n                          number\n                          title\n                          body\n                          state\n                          labels(first: 10) { nodes { name } }\n                          createdAt\n                          updatedAt\n                          url\n                          repository { name owner { login } }\n                        }\n                      }\n                      fieldValues(first: 20) {\n                        nodes {\n                          ... on ProjectV2ItemFieldSingleSelectValue {\n                            field { ... on ProjectV2FieldCommon { name } }\n                            name\n                          }\n                        }\n                      }\n                    }\n                    pageInfo { hasNextPage endCursor }\n                  }\n                }\n              }\n            }\n            \"#\n        };\n\n        let mut all = vec![];\n        let mut cursor: Option\u003cString\u003e = None;\n        loop {\n            let vars = json!({\n                \"owner\": self.owner,\n                \"projectNumber\": self.project_number,\n                \"first\": 50,\n                \"after\": cursor,\n            });\n            let data = self.graphql_query(query_template, vars).await?;\n            let root = if is_org {\n                data.get(\"organization\")\n            } else {\n                data.get(\"user\")\n            };\n            let items = root\n                .and_then(|r| r.get(\"projectV2\"))\n                .and_then(|p| p.get(\"items\"))\n                .and_then(|i| i.get(\"nodes\"))\n                .and_then(|n| n.as_array())\n                .cloned()\n                .unwrap_or_default();\n            let page_info = root\n                .and_then(|r| r.get(\"projectV2\"))\n                .and_then(|p| p.get(\"items\"))\n                .and_then(|i| i.get(\"pageInfo\"));\n            let has_next = page_info\n                .and_then(|pi| pi.get(\"hasNextPage\"))\n                .and_then(|h| h.as_bool())\n                .unwrap_or(false);\n            let next_cursor = page_info\n                .and_then(|pi| pi.get(\"endCursor\"))\n                .and_then(|c| c.as_str())\n                .map(|s| s.to_string());\n\n            all.extend(items);\n            if !has_next || next_cursor.is_none() {\n                break;\n            }\n            cursor = next_cursor;\n        }\n        Ok(all)\n    }\n\n    fn extract_status(\u0026self, item: \u0026serde_json::Value) -\u003e Option\u003cString\u003e {\n        item.get(\"fieldValues\")\n            .and_then(|fv| fv.get(\"nodes\"))\n            .and_then(|nodes| nodes.as_array())\n            .and_then(|arr| {\n                arr.iter().find_map(|node| {\n                    let field_name = node\n                        .get(\"field\")\n                        .and_then(|f| f.get(\"name\"))\n                        .and_then(|n| n.as_str())?;\n                    if field_name == \"Status\" {\n                        node.get(\"name\")\n                            .and_then(|n| n.as_str())\n                            .map(|s| s.to_lowercase())\n                    } else {\n                        None\n                    }\n                })\n            })\n    }\n\n    fn normalize_item(\u0026self, item: \u0026serde_json::Value) -\u003e Option\u003cIssue\u003e {\n        let content = item.get(\"content\")?;\n        content.get(\"number\")?;\n\n        let repo_name = content\n            .get(\"repository\")\n            .and_then(|r| r.get(\"name\"))\n            .and_then(|n| n.as_str())\n            .unwrap_or(\"\");\n        if repo_name != self.repo {\n            return None;\n        }\n\n        let number = content.get(\"number\")?.as_i64()?;\n        let title = content\n            .get(\"title\")\n            .and_then(|t| t.as_str())\n            .unwrap_or(\"\")\n            .to_string();\n        let body = content\n            .get(\"body\")\n            .and_then(|b| b.as_str())\n            .map(|s| s.to_string());\n        let labels: Vec\u003cString\u003e = content\n            .get(\"labels\")\n            .and_then(|l| l.get(\"nodes\"))\n            .and_then(|n| n.as_array())\n            .map(|arr| {\n                arr.iter()\n                    .filter_map(|node| {\n                        node.get(\"name\")\n                            .and_then(|n| n.as_str())\n                            .map(|s| s.to_lowercase())\n                    })\n                    .collect()\n            })\n            .unwrap_or_default();\n\n        let status = self.extract_status(item);\n        let state = status.unwrap_or_else(|| {\n            content\n                .get(\"state\")\n                .and_then(|s| s.as_str())\n                .unwrap_or(\"open\")\n                .to_lowercase()\n        });\n\n        Some(Issue {\n            id: number.to_string(),\n            identifier: format!(\"{}-{}\", self.repo.to_uppercase(), number),\n            title,\n            description: body,\n            priority: None,\n            state,\n            branch_name: None,\n            url: content\n                .get(\"url\")\n                .and_then(|u| u.as_str())\n                .map(|s| s.to_string()),\n            labels,\n            blocked_by: vec![],\n            created_at: content\n                .get(\"createdAt\")\n                .and_then(|s| s.as_str())\n                .and_then(|s| s.parse::\u003cDateTime\u003cUtc\u003e\u003e().ok()),\n            updated_at: content\n                .get(\"updatedAt\")\n                .and_then(|s| s.as_str())\n                .and_then(|s| s.parse::\u003cDateTime\u003cUtc\u003e\u003e().ok()),\n        })\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::path::PathBuf;\n\n    fn make_config(slug: \u0026str, number: i64, api_key: \u0026str) -\u003e ServiceConfig {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut tracker = serde_yaml::Mapping::new();\n        tracker.insert(\n            serde_yaml::Value::String(\"kind\".into()),\n            serde_yaml::Value::String(\"github\".into()),\n        );\n        tracker.insert(\n            serde_yaml::Value::String(\"api_key\".into()),\n            serde_yaml::Value::String(api_key.into()),\n        );\n        tracker.insert(\n            serde_yaml::Value::String(\"project_slug\".into()),\n            serde_yaml::Value::String(slug.into()),\n        );\n        tracker.insert(\n            serde_yaml::Value::String(\"project_number\".into()),\n            serde_yaml::Value::Number(number.into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"tracker\".into()),\n            serde_yaml::Value::Mapping(tracker),\n        );\n        ServiceConfig::new(raw, PathBuf::from(\"/tmp\"), \"\".into())\n    }\n\n    #[test]\n    fn test_github_tracker_new_ok() {\n        let config = make_config(\"owner/repo\", 1, \"key\");\n        let tracker = GithubTracker::new(\u0026config).unwrap();\n        assert_eq!(tracker.owner, \"owner\");\n        assert_eq!(tracker.repo, \"repo\");\n        assert_eq!(tracker.project_number, 1);\n    }\n\n    #[test]\n    fn test_github_tracker_new_invalid_slug() {\n        let config = make_config(\"invalid\", 1, \"key\");\n        let result = GithubTracker::new(\u0026config);\n        assert!(matches!(result, Err(SympheoError::InvalidConfiguration(_))));\n    }\n\n    #[test]\n    fn test_github_tracker_new_missing_api_key() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut tracker = serde_yaml::Mapping::new();\n        tracker.insert(\n            serde_yaml::Value::String(\"kind\".into()),\n            serde_yaml::Value::String(\"github\".into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"tracker\".into()),\n            serde_yaml::Value::Mapping(tracker),\n        );\n        let config = ServiceConfig::new(raw, PathBuf::from(\"/tmp\"), \"\".into());\n        let result = GithubTracker::new(\u0026config);\n        assert!(matches!(result, Err(SympheoError::MissingTrackerApiKey)));\n    }\n\n    #[test]\n    fn test_extract_status_found() {\n        let config = make_config(\"owner/repo\", 1, \"key\");\n        let tracker = GithubTracker::new(\u0026config).unwrap();\n        let item = serde_json::json!({\n            \"fieldValues\": {\n                \"nodes\": [\n                    {\n                        \"field\": { \"name\": \"Status\" },\n                        \"name\": \"In Progress\"\n                    },\n                    {\n                        \"field\": { \"name\": \"Priority\" },\n                        \"name\": \"High\"\n                    }\n                ]\n            }\n        });\n        assert_eq!(tracker.extract_status(\u0026item), Some(\"in progress\".to_string()));\n    }\n\n    #[test]\n    fn test_extract_status_no_match() {\n        let config = make_config(\"owner/repo\", 1, \"key\");\n        let tracker = GithubTracker::new(\u0026config).unwrap();\n        let item = serde_json::json!({\n            \"fieldValues\": {\n                \"nodes\": [\n                    {\n                        \"field\": { \"name\": \"Priority\" },\n                        \"name\": \"High\"\n                    }\n                ]\n            }\n        });\n        assert_eq!(tracker.extract_status(\u0026item), None);\n    }\n\n    #[test]\n    fn test_extract_status_missing_field_values() {\n        let config = make_config(\"owner/repo\", 1, \"key\");\n        let tracker = GithubTracker::new(\u0026config).unwrap();\n        let item = serde_json::json!({});\n        assert_eq!(tracker.extract_status(\u0026item), None);\n    }\n\n    #[test]\n    fn test_normalize_item_ok() {\n        let config = make_config(\"owner/repo\", 1, \"key\");\n        let tracker = GithubTracker::new(\u0026config).unwrap();\n        let item = serde_json::json!({\n            \"content\": {\n                \"number\": 42,\n                \"title\": \"Fix bug\",\n                \"body\": \"Description here\",\n                \"state\": \"OPEN\",\n                \"labels\": { \"nodes\": [{ \"name\": \"bug\" }, { \"name\": \"urgent\" }] },\n                \"createdAt\": \"2024-01-15T10:00:00Z\",\n                \"updatedAt\": \"2024-01-16T12:00:00Z\",\n                \"url\": \"https://github.com/owner/repo/issues/42\",\n                \"repository\": { \"name\": \"repo\", \"owner\": { \"login\": \"owner\" } }\n            },\n            \"fieldValues\": {\n                \"nodes\": [\n                    { \"field\": { \"name\": \"Status\" }, \"name\": \"In Progress\" }\n                ]\n            }\n        });\n        let issue = tracker.normalize_item(\u0026item).unwrap();\n        assert_eq!(issue.id, \"42\");\n        assert_eq!(issue.identifier, \"REPO-42\");\n        assert_eq!(issue.title, \"Fix bug\");\n        assert_eq!(issue.description, Some(\"Description here\".to_string()));\n        assert_eq!(issue.state, \"in progress\");\n        assert_eq!(issue.labels, vec![\"bug\", \"urgent\"]);\n        assert_eq!(issue.url, Some(\"https://github.com/owner/repo/issues/42\".to_string()));\n        assert!(issue.created_at.is_some());\n        assert!(issue.updated_at.is_some());\n    }\n\n    #[test]\n    fn test_normalize_item_wrong_repo() {\n        let config = make_config(\"owner/repo\", 1, \"key\");\n        let tracker = GithubTracker::new(\u0026config).unwrap();\n        let item = serde_json::json!({\n            \"content\": {\n                \"number\": 42,\n ition {\n    pub config: serde_yaml::Mapping,\n    pub prompt_template: String,\n}\n\n#[derive(Debug, Clone, Default)]\npub struct TokenTotals {\n    pub input_tokens: u64,\n    pub output_tokens: u64,\n    pub total_tokens: u64,\n    pub seconds_running: f64,\n}\n\n#[derive(Debug, Clone)]\npub struct LiveSession {\n    pub session_id: String,\n    pub thread_id: String,\n    pub turn_id: String,\n    pub agent_pid: Option\u003cu32\u003e,\n    pub last_event: Option\u003cString\u003e,\n    pub last_timestamp: Option\u003cDateTime\u003cUtc\u003e\u003e,\n    pub last_message: Option\u003cString\u003e,\n    pub input_tokens: u64,\n    pub output_tokens: u64,\n    pub total_tokens: u64,\n    pub last_reported_input_tokens: u64,\n    pub last_reported_output_tokens: u64,\n    pub last_reported_total_tokens: u64,\n    pub turn_count: u32,\n}\n\n#[derive(Debug, Clone)]\npub struct RunAttempt {\n    pub issue_id: String,\n    pub issue_identifier: String,\n    pub attempt: Option\u003cu32\u003e,\n    pub workspace_path: std::path::PathBuf,\n    pub started_at: DateTime\u003cUtc\u003e,\n    pub status: AttemptStatus,\n    pub error: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum AttemptStatus {\n    PreparingWorkspace,\n    BuildingPrompt,\n    LaunchingAgentProcess,\n    InitializingSession,\n    StreamingTurn,\n    Finishing,\n    Succeeded,\n    Failed,\n    TimedOut,\n    Stalled,\n    CanceledByReconciliation,\n}\n\n#[derive(Debug, Clone)]\npub struct RetryEntry {\n    pub issue_id: String,\n    pub identifier: String,\n    pub attempt: u32,\n    pub due_at: std::time::Instant,\n    pub error: Option\u003cString\u003e,\n}\n\n#[derive(Debug, Clone)]\npub struct WorkspaceInfo {\n    pub path: std::path::PathBuf,\n    pub workspace_key: String,\n    pub created_now: bool,\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_issue_is_blocked_with_active_blocker() {\n        let issue = Issue {\n            id: \"1\ al = vec![\"closed\".into()];\n        assert!(!issue.is_blocked(\u0026terminal));\n    }\n\n    #[test]\n    fn test_issue_blocked_blocker_with_no_state() {\n        let issue = Issue {\n            id: \"1\".into(),\n            identifier: \"TEST-1\".into(),\n            title: \"test\".into(),\n            description: None,\n            priority: None,\n            state: \"todo\".into(),\n            branch_name: None,\n            url: None,\n            labels: vec![],\n            blocked_by: vec![BlockerRef {\n                id: Some(\"2\".into()),\n                identifier: Some(\"TEST-2\".into()),\n                state: None,\n            }],\n            created_at: None,\n            updated_at: None,\n        };\n        let terminal = vec![\"closed\".into()];\n        assert!(!issue.is_blocked(\u0026terminal));\n    }\n\n    #[test]\n    fn test_issue_blocked_multiple_blockers() {\n        let issue = Issue {\n            id: \"1\".into(),\n            identifier: \"TEST-1\".into(),\n            title: \"test\".into(),\n            description: None,\n            priority: None,\n            state: \"todo\".into(),\n            branch_name: None,\n            url: None,\n            labels: vec![],\n            blocked_by: vec![\n                BlockerRef {\n                    id: Some(\"2\".into()),\n                    identifier: Some(\"TEST-2\".into()),\n                    state: Some(\"closed\".into()),\n                },\n                BlockerRef {\n                    id: Some(\"3\".into()),\n                    identifier: Some(\"TEST-3\".into()),\n                    state: Some(\"in progress\".into()),\n                },\n            ],\n            created_at: None,\n            updated_at: None,\n        };\n        let terminal = vec![\"closed\".into(), \"done\".into()];\n        assert!(issue.is_blocked(\u0026terminal));\n    }\n\n    #[test]\n    fn test_token_totals_default() {\n        let totals = TokenTotals::default();\ .trim_start();\n    if let Some(after_first) = trimmed.strip_prefix(\"---\") {\n        if let Some(end_idx) = after_first.find(\"---\") {\n            let front_matter = \u0026after_first[..end_idx];\n            let body = \u0026after_first[end_idx + 3..];\n            let yaml_value: serde_yaml::Value = serde_yaml::from_str(front_matter)\n                .map_err(|e| SympheoError::WorkflowParseError(e.to_string()))?;\n            let mapping = yaml_value.as_mapping().ok_or(SympheoError::WorkflowFrontMatterNotAMap)?;\n            Ok(WorkflowDefinition {\n                config: mapping.clone(),\n                prompt_template: body.trim().to_string(),\n            })\n        } else {\n            Err(SympheoError::WorkflowParseError(\n                \"unclosed front matter\".into(),\n            ))\n        }\n    } else {\n        Ok(WorkflowDefinition {\n            config: serde_yaml::Mapping::new(),\n            prompt_template: content.trim().to_string(),\n        })\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_parse_no_front_matter() {\n        let wf = parse(\"Hello world\").unwrap();\n        assert!(wf.config.is_empty());\n        assert_eq!(wf.prompt_template, \"Hello world\");\n    }\n\n    #[test]\n    fn test_parse_with_front_matter() {\n        let text = \"---\\ntracker:\\n  kind: github\\n---\\nDo work\";\n        let wf = parse(text).unwrap();\n        assert!(!wf.config.is_empty());\n        assert_eq!(wf.prompt_template, \"Do work\");\n    }\n\n    #[test]\n    fn test_parse_empty_front_matter() {\n        let text = \"---\\n---\\nJust prompt\";\n        // Empty YAML front matter parses as Null, not a Mapping\n        let result = parse(text);\n        assert!(matches!(result, Err(SympheoError::WorkflowFrontMatterNotAMap)));\n    }\n\n    #[test]\n    fn test_parse_unclosed_front_matter() {\n        let text = \"---\\ntracker: kind\\nDo work\";\n        let result = parse(text);\n        assert!(match nse {\n    #[serde(default)]\n    result: String,\n    #[serde(default)]\n    exit_code: i32,\n}\n\npub struct DaytonaBackend {\n    config: DaytonaConfig,\n    workspace_manager: WorkspaceManager,\n    client: reqwest::Client,\n}\n\nimpl DaytonaBackend {\n    pub fn new(service_config: \u0026ServiceConfig) -\u003e Result\u003cSelf, SympheoError\u003e {\n        let config = DaytonaConfig::from_service(service_config)?;\n        let workspace_manager = WorkspaceManager::new(service_config)?;\n        let client = reqwest::Client::builder()\n            .timeout(Duration::from_secs(config.timeout_sec.max(30)))\n            .build()\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"client build: {e}\")))?;\n        Ok(Self {\n            config,\n            workspace_manager,\n            client,\n        })\n    }\n\n    fn sandbox_meta_path(\u0026self, workspace_path: \u0026Path) -\u003e std::path::PathBuf {\n        workspace_path.join(\".daytona_sandbox_id\")\n    }\n\n    async fn read_sandbox_id(\u0026self, workspace_path: \u0026Path) -\u003e Option\u003cString\u003e {\n        let path = self.sandbox_meta_path(workspace_path);\n        tokio::fs::read_to_string(\u0026path).await.ok().map(|s| s.trim().to_string())\n    }\n\n    async fn write_sandbox_id(\u0026self, workspace_path: \u0026Path, id: \u0026str) -\u003e Result\u003c(), SympheoError\u003e {\n        let path = self.sandbox_meta_path(workspace_path);\n        tokio::fs::write(\u0026path, id)\n            .await\n            .map_err(|e| SympheoError::Io(format!(\"write sandbox id: {e}\")))?;\n        Ok(())\n    }\n\n    async fn create_sandbox(\u0026self) -\u003e Result\u003cDaytonaSandbox, SympheoError\u003e {\n        let url = format!(\"{}/api/sandbox\", self.config.api_url.trim_end_matches('/'));\n\n        let mut payload = serde_json::Map::new();\n        if let Some(ref img) = self.config.image {\n            payload.insert(\"image\".to_string(), serde_json::Value::String(img.clone()));\n        }\n        payload.insert(\"target\".to_string(), serde_json::Value::String(self.config.target.clone()));\n        if !self.config.env.is_empty() {\n            let env_map: serde_json::Map\u003cString, serde_json::Value\u003e = self.config\n                .env\n                .iter()\n                .map(|(k, v)| (k.clone(), serde_json::Value::String(v.clone())))\n                .collect();\n            payload.insert(\"env\".to_string(), serde_json::Value::Object(env_map));\n        }\n\n        tracing::info!(url = %url, \"creating Daytona sandbox\");\n\n        let resp = self\n            .client\n            .post(\u0026url)\n            .header(\"Authorization\", format!(\"Bearer {}\", self.config.api_key))\n            .header(\"Content-Type\", \"application/json\")\n            .json(\u0026payload)\n            .send()\n            .await\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"create sandbox request: {e}\")))?;\n\n        let status = resp.status();\n        let body = resp\n            .text()\n            .await\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"create sandbox body: {e}\")))?;\n\n        if !status.is_success() {\n            return Err(SympheoError::DaytonaApiError(format!(\n                \"create sandbox failed: HTTP {} - {}\",\n                status, body\n            )));\n        }\n\n        let sandbox: DaytonaSandbox = serde_json::from_str(\u0026body)\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"create sandbox json: {e} ({body})\")))?;\n\n        tracing::info!(sandbox_id = %sandbox.id, \"daytona sandbox created\");\n        Ok(sandbox)\n    }\n\n    #[allow(dead_code)]\n    async fn delete_sandbox(\u0026self, sandbox_id: \u0026str) -\u003e Result\u003c(), SympheoError\u003e {\n        let url = format!(\n            \"{}/api/sandbox/{}\",\n            self.config.api_url.trim_end_matches('/'),\n            sandbox_id\n        );\n        let resp = self\n            .client\n            .delete(\u0026url)\n            .header(\"Authorization\", format!(\"Bearer {}\", self.config.api_key))\n            .send()\n            .await\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"delete sandbox request: {e}\")))?;\n\n        if !resp.status().is_success() {\n            let body = resp.text().await.unwrap_or_default();\n            tracing::warn!(sandbox_id = %sandbox_id, body = %body, \"failed to delete daytona sandbox\");\n        } else {\n            tracing::info!(sandbox_id = %sandbox_id, \"daytona sandbox deleted\");\n        }\n        Ok(())\n    }\n\n    async fn execute_command(\n        \u0026self,\n        sandbox_id: \u0026str,\n        command: \u0026str,\n        cwd: \u0026str,\n    ) -\u003e Result\u003cDaytonaExecuteResponse, SympheoError\u003e {\n        let url = format!(\n            \"https://proxy.app.daytona.io/toolbox/{}/process/execute\",\n            sandbox_id\n        );\n\n        let payload = serde_json::json!({\n            \"command\": command,\n            \"cwd\": cwd,\n            \"timeout\": self.config.timeout_sec as u32,\n        });\n\n        tracing::debug!(sandbox_id = %sandbox_id, command = %command, \"executing in daytona sandbox\");\n\n        let resp = self\n            .client\n            .post(\u0026url)\n            .header(\"Authorization\", format!(\"Bearer {}\", self.config.api_key))\n            .header(\"Content-Type\", \"application/json\")\n            .json(\u0026payload)\n            .send()\n            .await\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"execute request: {e}\")))?;\n\n        let status = resp.status();\n        let body = resp\n            .text()\n            .await\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"execute body: {e}\")))?;\n\n        if !status.is_success() {\n            return Err(SympheoError::DaytonaApiError(format!(\n                \"execute failed: HTTP {} - {}\",\n                status, body\n            )));\n        }\n\n        let result: DaytonaExecuteResponse = serde_json::from_str(\u0026body)\n            .map_err(|e| SympheoError::DaytonaApiError(format!(\"execute json: {e} ({body})\")))?;\n\n        Ok(result)\n    }\n}\n\n#[async_trait]\nimpl AgentBackend for DaytonaBackend {\n    async fn run_turn(\n        \u0026self,\n        issue: \u0026Issue,\n        prompt: \u0026str,\n        session_id: Option\u003c\u0026str\u003e,\n        workspace_path: \u0026Path,\n    ) -\u003e Result\u003cTurnResult, SympheoError\u003e {\n        self.workspace_manager\n            .validate_inside_root(workspace_path)?;\n\n        let sandbox_id = match self.read_sandbox_id(workspace_path).await {\n            Some(id) =\u003e id,\n            None =\u003e {\n                let sandbox = self.create_sandbox().await?;\n                self.write_sandbox_id(workspace_path, \u0026sandbox.id).await?;\n                sandbox.id\n            }\n        };\n\n        let mut opencode_cmd = format!(\n            r#\"{} \"{}\" --format json --dir {} --dangerously-skip-permissions\"#,\n            self.config.command,\n            shell_escape(prompt),\n            shell_escape(\u0026workspace_path.to_string_lossy())\n        );\n        if let Some(sid) = session_id {\n            opencode_cmd.push_str(\u0026format!(\" --session {}\", shell_escape(sid)));\n        }\n\n        tracing::info!(\n            issue_id = %issue.id,\n            issue_identifier = %issue.identifier,\n            sandbox_id = %sandbox_id,\n            \"launching opencode agent (daytona backend)\"\n        );\n\n        let exec_result = timeout(\n            Duration::from_millis(self.config.turn_timeout_ms),\n            self.execute_command(\u0026sandbox_id, \u0026opencode_cmd, \"/workspace\"),\n        )\n        .await\n        .map_err(|_| SympheoError::AgentTurnTimeout)?;\n\n        let exec = exec_result?;\n\n        if exec.exit_code != 0 {\n            return Err(SympheoError::AgentRunnerError(format!(\n                \"daytona process exited with code {}: {}\",\n                exec.exit_code, exec.result\n            )));\n        }\n\n        let mut current_session: Option\u003cString\u003e = None;\n        let mut current_turn: Option\u003cString\u003e = None;\n        let mut accumulated_text = String::new();\n        let mut tokens: Option\u003cTokenInfo\u003e = None;\n        let mut success = false;\n\n        for line in exec.result.lines() {\n            if line.trim().is_empty() {\n                continue;\n            }\n            match parse_line(line) {\n                Some(OpencodeEvent::StepStart { session_id, part, .. }) =\u003e {\n                    current_session = Some(session_id);\n                    current_turn = Some(part.message_id.clone());\n                }\n                Some(OpencodeEvent::Text { part, .. }) =\u003e {\n                    accumulated_text.push_str(\u0026part.text);\n                }\n                Some(OpencodeEvent::StepFinish { part, .. }) =\u003e {\n                    tokens = part.tokens.clone();\n                    success = part.reason == \"stop\" || part.reason == \"tool-calls\";\n                    break;\n                }\n                _ =\u003e {}\n            }\n        }\n\n        let sid = current_session.unwrap_or_else(|| issue.id.clone());\n        let tid = current_turn.unwrap_or_else(|| \"turn-1\".into());\n\n        Ok(TurnResult {\n            session_id: sid.clone(),\n            turn_id: tid,\n            success,\n            text: accumulated_text,\n            tokens,\n        })\n    }\n}\n\nfn shell_escape(s: \u0026str) -\u003e String {\n    s.replace('\\\\', \"\\\\\\\\\")\n        .replace('\"', \"\\\\\\\"\")\n        .replace('$', \"\\\\$\")\n        .replace('`', \"\\\\`\")\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::path::PathBuf;\n\n    fn service_config_with_daytona(api_url: _daytona_config_from_service() {\n        let config = service_config_with_daytona(\"https://custom.daytona.io\");\n        let dc = DaytonaConfig::from_service(\u0026config).unwrap();\n        assert_eq!(dc.api_key, \"test-key\");\n        assert_eq!(dc.api_url, \"https://custom.daytona.io\");\n        assert_eq!(dc.target, \"eu\");\n        assert_eq!(dc.image, Some(\"custom-image\".into()));\n        assert_eq!(dc.timeout_sec, 7200);\n        assert_eq!(dc.command, \"opencode run\");\n        assert_eq!(dc.env.get(\"FOO\"), Some(\u0026\"bar\".to_string()));\n    }\n\n    #[test]\n    fn test_daytona_config_missing_section() {\n        let config = ServiceConfig::new(serde_yaml::Mapping::new(), PathBuf::from(\"/tmp\"), \"\".into());\n        let result = DaytonaConfig::from_service(\u0026config);\n        assert!(matches!(result, Err(SympheoError::InvalidConfiguration(_))));\n    }\n\n    #[test]\n    fn test_daytona_config_missing_api_key() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut daytona = serde_yaml::Mapping::new();\n        daytona.insert(\n            serde_yaml::Value::String(\"enabled\".into()),\n            serde_yaml::Value::Bool(true),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"daytona\".into()),\n            serde_yaml::Value::Mapping(daytona),\n        );\n        let config = ServiceConfig::new(raw, PathBuf::from(\"/tmp\"), \"\".into());\n        let result = DaytonaConfig::from_service(\u0026config);\n        assert!(matches!(result, Err(SympheoError::InvalidConfiguration(_))));\n    }\n\n    #[test]\n    fn test_daytona_backend_new() {\n        let config = service_config_with_daytona(\"https://custom.daytona.io\");\n        let backend = DaytonaBackend::new(\u0026config).unwrap();\n        assert_eq!(backend.config.api_key, \"test-key\");\n    }\n\n    #[test]\n    fn test_shell_escape_daytona() {\n        assert_eq!(shell_escape(\"a\\\\b\"), \"a\\\\\\\\b\");\n        assert_eq!(shell_escape(\"\\\"\"), \"\\\\\\\"\");\n        assert_eq!(shell_escape(\"$\"), \"\\\\$\");\n        assert_eq!(shell_escape(\"`\"), \"\\\\`\");\n    }\n\n    #[test]\n    fn test_sandbox_meta_path() {\n        let config = service_config_with_daytona(\"https://custom.daytona.io\");\n        let backend = DaytonaBackend::new(\u0026config).unwrap();\n        let path = backend.sandbox_meta_path(Path::new(\"/workspace\"));\n        assert_eq!(path, PathBuf::from(\"/workspace/.daytona_sandbox_id\"));\n    }\n\n    #[tokio::test]\n    async fn test_create_sandbox_success() {\n        let mock_server = wiremock::MockServer::start().await;\n        wiremock::Mock::given(wiremock::matchers::method(\"POST\"))\n            .and(wiremock::matchers::path(\"/api/sandbox\"))\n            .respond_with(wiremock::ResponseTemplate::new(200).set_body_json(serde_json::json!({\n                \"id\": \"sandbox-123\",\n                \"state\": \"running\"\n            })))\n            .mount(\u0026mock_server)\n            .await;\n\n        let config = service_config_with_daytona(\u0026mock_server.uri());\n        let backend = DaytonaBackend::new(\u0026config).unwrap();\n        let sandbox = backend.create_sandbox().await.unwrap();\n        assert_eq!(sandbox.id, \"sandbox-123\");\n        assert_eq!(sandbox.state, \"running\");\n    }\n\n    #[tokio::test]\n    async fn test_create_sandbox_failure() {\n        let mock_server = wiremock::MockServer::start().await;\n        wiremock::Mock::given(wiremock::matchers::method(\"POST\"))\n            .and(wiremock::matchers::path(\"/api/sandbox\"))\n            .respond_with(wiremock::ResponseTemplate::new(500).set_body_string(\"error\"))\n            .mount(\u0026mock_server)\n            .await;\n\n        let config = service_config_with_daytona(\u0026mock_server.uri());\n        let backend = DaytonaBackend::new(\u0026config).unwrap();\n        let result = backend.create_sandbox().await;\n        assert!(matches!(result, Err(SympheoError::DaytonaApiError(_))));\n    }\n\n    #[tokio::test]\n    async fn test_delete_sandbox_success() {\n        let mock_server = wiremock::MockServer::start().await;\n        wiremock::Mock::given(wiremock::matchers::method(\"DELETE\"))\n            .and(wiremock::matchers::path(\"/api/sandbox/abc\"))\n            .respond_with(wiremock::ResponseTemplate::new(200))\n            .mount(\u0026mock_server)\n            .await;\n\n        let config = service_config_with_daytona(\u0026mock_server.uri());\n        let backend = DaytonaBackend::new(\u0026config).unwrap();\n        let result = backend.delete_sandbox(\"abc\").await;\n        assert!(result.is_ok());\n    }\n}\n","traces":[{"line":27,"address":[12371801,12371785,12370272],"length":1,"stats":{"Line":3}},{"line":28,"address":[11915194,11915290,11915158],"length":1,"stats":{"Line":8}},{"line":30,"address":[12370334],"length":1,"stats":{"Line":3}},{"line":31,"address":[11577054],"length":1,"stats":{"Line":1}},{"line":34,"address":[12370955,12370540,12370684,12370731,12370853],"length":1,"stats":{"Line":8}},{"line":35,"address":[11799000,11799052],"length":1,"stats":{"Line":2}},{"line":36,"address":[11915417],"length":1,"stats":{"Line":1}},{"line":39,"address":[11799844],"length":1,"stats":{"Line":1}},{"line":40,"address":[13636161],"length":1,"stats":{"Line":1}},{"line":41,"address":[12019577],"length":1,"stats":{"Line":5}},{"line":42,"address":[11799501],"length":1,"stats":{"Line":5}},{"line":43,"address":[11799566],"length":1,"stats":{"Line":1}},{"line":44,"address":[11799631],"length":1,"stats":{"Line":5}},{"line":45,"address":[13636461],"length":1,"stats":{"Line":5}},{"line":46,"address":[14536421],"length":1,"stats":{"Line":1}},{"line":47,"address":[14536486],"length":1,"stats":{"Line":5}},{"line":74,"address":[13638748,13637424,13638740],"length":1,"stats":{"Line":2}},{"line":75,"address":[11800686],"length":1,"stats":{"Line":2}},{"line":76,"address":[11801002,11801062,11801978],"length":1,"stats":{"Line":6
