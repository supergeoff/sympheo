content":"use async_trait::async_trait;\nuse crate::agent::backend::AgentBackend;\nuse crate::agent::parser::{parse_line, OpencodeEvent, TokenInfo, TurnResult};\nuse crate::config::typed::ServiceConfig;\nuse crate::error::SympheoError;\nuse crate::tracker::model::Issue;\nuse crate::workspace::manager::WorkspaceManager;\nuse std::path::Path;\nuse std::process::Stdio;\nuse tokio::io::{AsyncBufReadExt, BufReader};\nuse tokio::process::Command;\nuse tokio::time::{timeout, Duration};\n\npub struct LocalBackend {\n    command: String,\n    turn_timeout: Duration,\n    workspace_manager: WorkspaceManager,\n}\n\nimpl LocalBackend {\n    pub fn new(config: \u0026ServiceConfig) -\u003e Result\u003cSelf, SympheoError\u003e {\n        Ok(Self {\n            command: config.codex_command(),\n            turn_timeout: Duration::from_millis(config.codex_turn_timeout_ms()),\n            workspace_manager: WorkspaceManager::new(config)?,\n        })\n    }\n}\n\n#[async_trait]\nimpl AgentBackend for LocalBackend {\n    async fn run_turn(\n        \u0026self,\n        issue: \u0026Issue,\n        prompt: \u0026str,\n        session_id: Option\u003c\u0026str\u003e,\n        workspace_path: \u0026Path,\n    ) -\u003e Result\u003cTurnResult, SympheoError\u003e {\n        self.workspace_manager\n            .validate_inside_root(workspace_path)?;\n\n        let mut cmd = Command::new(\"bash\");\n        cmd.arg(\"-lc\");\n\n        let mut opencode_cmd = format!(\n            r#\"{} \"{}\" --format json --dir {} --dangerously-skip-permissions\"#,\n            self.command,\n            shell_escape(prompt),\n            shell_escape(\u0026workspace_path.to_string_lossy())\n        );\n        if let Some(sid) = session_id {\n            opencode_cmd.push_str(\u0026format!(\" --session {}\", shell_escape(sid)));\n        }\n        cmd.arg(\u0026opencode_cmd);\n        cmd.current_dir(workspace_path);\n        cmd.stdout(Stdio::piped());\n        cmd.stderr(Stdio::piped());\n\n        tracing::info!(\n            issue_id = %issue.id,\n            issue_identifier = %issue.identifier,\n            \"launching opencode agent (local backend)\"\n        );\n\n        let mut child = cmd\n            .spawn()\n            .map_err(|e| SympheoError::AgentRunnerError(format!(\"spawn failed: {e}\")))?;\n\n        let stdout = child\n            .stdout\n            .take()\n            .ok_or_else(|| SympheoError::AgentRunnerError(\"missing stdout\".into()))?;\n        let stderr = child\n            .stderr\n            .take()\n            .ok_or_else(|| SympheoError::AgentRunnerError(\"missing stderr\".into()))?;\n\n        // Spawn stderr reader task to capture agent diagnostic output\n        let issue_id_for_stderr = issue.id.clone();\n        let stderr_handle = tokio::spawn(async move {\n            let stderr_reader = BufReader::new(stderr);\n            let mut stderr_lines = stderr_reader.lines();\n            while let Ok(Some(line)) = stderr_lines.next_line().await {\n                let trimmed = line.trim();\n                if !trimmed.is_empty() {\n                    tracing::warn!(\n                        issue_id = %issue_id_for_stderr,\n                        target = \"opencode::stderr\",\n                        \"{}\",\n                        trimmed\n                    );\n                }\n            }\n        });\n\n        let reader = BufReader::new(stdout);\n        let mut lines = reader.lines();\n\n        let mut current_session: Option\u003cString\u003e = None;\n        let mut current_turn: Option\u003cString\u003e = None;\n        let mut accumulated_text = String::new();\n        let mut tokens: Option\u003cTokenInfo\u003e = None;\n        let mut success = false;\n\n        let read_result = timeout(self.turn_timeout, async {\n            while let Ok(Some(line)) = lines.next_line().await {\n                if line.trim().is_empty() {\n                    continue;\n                }\n                match parse_line(\u0026line) {\n                    Some(OpencodeEvent::StepStart { session_id, part, .. }) =\u003e {\n                        current_session = Some(session_id);\n                        current_turn = Some(part.message_id.clone());\n                        tracing::debug!(session = %part.session_id, message = %part.message_id, \"step_start\");\n                    }\n                    Some(OpencodeEvent::Text { part, .. }) =\u003e {\n                        accumulated_text.push_str(\u0026part.text);\n                    }\n                    Some(OpencodeEvent::StepFinish { part, .. }) =\u003e {\n                        tokens = part.tokens.clone();\n                        success = part.reason == \"stop\" || part.reason == \"tool-calls\";\n                        tracing::info!(\n                            reason = %part.reason,\n                            success,\n                            \"step_finish\"\n                        );\n                        break;\n                    }\n                    _ =\u003e {}\n                }\n            }\n        })\n        .await;\n\n        if read_result.is_err() {\n            let _ = child.kill().await;\n            let _ = stderr_handle.abort();\n            return Err(SympheoError::AgentTurnTimeout);\n        }\n\n        // Terminate the process since the turn is complete\n        // opencode run may not exit on its own after step_finish\n        let _ = child.kill().await;\n        let _ = stderr_handle.abort();\n        // Attempt to reap the process without blocking the result\n        let _ = timeout(Duration::from_secs(5), child.wait()).await;\n\n        let sid = current_session.unwrap_or_else(|| issue.id.clone());\n        let tid = current_turn.unwrap_or_else(|| \"turn-1\".into());\n\n        Ok(TurnResult {\n            session_id: sid.clone(),\n            turn_id: tid,\n            success,\n            text: accumulated_text,\n            tokens,\n        })\n    }\n}\n\nfn shell_escape(s: \u0026str) -\u003e String {\n    s.replace('\\\\', \"\\\\\\\\\")\n        .replace('\"', \"\\\\\\\"\")\n        .replace('$', \"\\\\$\")\n        .replace('`', \"\\\\`\")\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::path::PathBuf;\n\n    #[test]\n    fn test_shell_escape_backslash() {\n        assert_eq!(shell_escape(\"a\\\\b\"), \"a\\\\\\\\b\");\n    }\n\n    #[test]\n    fn test_shell_escape_quote() {\n        assert_eq!(shell_escape(\"say \\\"hi\\\"\"), \"say \\\\\\\"hi\\\\\\\"\");\n    }\n\n    #[test]\n    fn test_shell_escape_dollar() {\n        assert_eq!(shell_escape(\"$HOME\"), \"\\\\$HOME\");\n    }\n\n    #[test]\n    fn test_shell_escape_backtick() {\n        assert_eq!(shell_escape(\"`cmd`\"), \"\\\\`cmd\\\\`\");\n    }\n\n    #[test]\n    fn test_shell_escape_combined() {\n        assert_eq!(shell_escape(\"\\\\\\\"$`\"), \"\\\\\\\\\\\\\\\"\\\\$\\\\`\");\n    }\n\n    #[tokio::test]\n    async fn test_local_backend_run_turn_timeout() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut workspace = serde_yaml::Mapping::new();\n        let tmp = std::env::temp_dir().join(format!(\"local_test_{}\", std::process::id()));\n        let _ = std::fs::remove_dir_all(\u0026tmp);\n        std::fs::create_dir_all(\u0026tmp).unwrap();\n        workspace.insert(\n            serde_yaml::Value::String(\"root\".into()),\n            serde_yaml::Value::String(tmp.to_string_lossy().to_string()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"workspace\".into()),\n            serde_yaml::Value::Mapping(workspace),\n        );\n        let mut codex = serde_yaml::Mapping::new();\n        codex.insert(\n            serde_yaml::Value::String(\"command\".into()),\n            serde_yaml::Value::String(r#\"bash -c \"sleep 1000\"\"#.into()),\n        );\n        codex.insert(\n            serde_yaml::Value::String(\"turn_timeout_ms\".into()),\n            serde_yaml::Value::Number(200.into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"codex\".into()),\n            serde_yaml::Value::Mapping(codex),\n        );\n        let config = ServiceConfig::new(raw, PathBuf::from(\"/tmp\"), \"\".into());\n        let backend = LocalBackend::new(\u0026config).unwrap();\n        let issue = crate::tracker::model::Issue {\n            id: \"1\".into(),\n            identifier: \"TEST-1\".into(),\n            title: \"test\".into(),\n            description: None,\n            priority: None,\n            state: \"todo\".into(),\n            branch_name: None,\n            url: None,\n            labels: vec![],\n            blocked_by: vec![],\n            created_at: None,\n            updated_at: None,\n        };\n        let result = backend.run_turn(\u0026issue, \"prompt\", None, \u0026tmp).await;\n        assert!(\n            matches!(result, Err(SympheoError::AgentTurnTimeout)),\n            \"expected AgentTurnTimeout, got {:?}\",\n            result\n        );\n        let _ = std::fs::remove_dir_all(\u0026tmp);\n    }\n\n    #[tokio::test]\n    async fn test_local_backend_run_turn_success() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut workspace = serde_yaml::Mapping::new();\n        let tmp = std::env::temp_dir().join(format!(\"local_test3_{}\", std::process::id()));\n        let _ = std::fs::remove_dir_all(\u0026tmp);\n        std::fs::create_dir_all(\u0026tmp).unwrap();\n        workspace.insert(\n            serde_yaml::Value::String(\"root\".into()),\n            serde_yaml::Value::String(tmp.to_string_lossy().to_string()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"workspace\".into()),\n            serde_yaml::Value::Mapping(workspace),\n        );\n        let mut codex = serde_yaml::Mapping::new();\n        // Print valid opencode events and exit\n        codex.insert(\n            serde_yaml::Value::String(\"command\".into()),\n            serde_yaml::Value::String(r#\"b er::get_i64(m, \"timeout_ms\"))\n            .unwrap_or(60000)\n            .max(0) as u64\n    }\n\n    pub fn max_concurrent_agents(\u0026self) -\u003e usize {\n        self.agent()\n            .and_then(|m| resolver::get_i64(m, \"max_concurrent_agents\"))\n            .unwrap_or(10)\n            .max(1) as usize\n    }\n\n    pub fn max_turns(\u0026self) -\u003e u32 {\n        self.agent()\n            .and_then(|m| resolver::get_i64(m, \"max_turns\"))\n            .unwrap_or(20)\n            .max(1) as u32\n    }\n\n    pub fn max_retry_backoff_ms(\u0026self) -\u003e u64 {\n        self.agent()\n            .and_then(|m| resolver::get_i64(m, \"max_retry_backoff_ms\"))\n            .unwrap_or(300000)\n            .max(1000) as u64\n    }\n\n    pub fn max_concurrent_agents_by_state(\u0026self) -\u003e HashMap\u003cString, usize\u003e {\n        let mut map = HashMap::new();\n        if let Some(agent_map) = self.agent() {\n            if let Some(state_map) = agent_map\n                .get(\"max_concurrent_agents_by_state\")\n                .and_then(|v| v.as_mapping())\n            {\n                for (k, v) in state_map {\n                    if let (Some(key), Some(val)) = (k.as_str(), v.as_i64()) {\n                        if val \u003e 0 {\n                            map.insert(key.to_lowercase(), val as usize);\n                        }\n                    }\n                }\n            }\n        }\n        map\n    }\n\n    pub fn codex_command(\u0026self) -\u003e String {\n        self.codex()\n            .and_then(|m| resolver::get_string(m, \"command\"))\n            .unwrap_or_else(|| \"opencode run\".to_string())\n    }\n\n    pub fn codex_turn_timeout_ms(\u0026self) -\u003e u64 {\n        self.codex()\n            .and_then(|m| resolver::get_i64(m, \"turn_timeout_ms\"))\n            .unwrap_or(3600000)\n            .max(0) as u64\n    }\n\n    pub fn codex_read_timeout_ms(\u0026self) -\u003e u64 {\n        self.codex()\n            .and pace cleanup\n    let tracker = Arc::new(GithubTracker::new(\u0026config)?);\n    let terminal_states = config.terminal_states();\n    match tracker.fetch_issues_by_states(\u0026terminal_states).await {\n        Ok(issues) =\u003e {\n            use sympheo::workspace::manager::WorkspaceManager;\n            let wm = WorkspaceManager::new(\u0026config)?;\n            for issue in issues {\n                wm.remove_workspace(\u0026issue.identifier, config.hook_script(\"before_remove\").as_deref())\n                    .await;\n            }\n        }\n        Err(e) =\u003e {\n            warn!(error = %e, \"startup terminal cleanup failed\");\n        }\n    }\n\n    let orchestrator = Arc::new(Orchestrator::new(config.clone(), tracker)?);\n    let state = orchestrator.state.clone();\n\n    // Optional HTTP server\n    if let Some(port) = cli.port {\n        let state_clone = state.clone();\n        tokio::spawn(async move {\n            if let Err(e) = sympheo::server::start_server(port, state_clone).await {\n                warn!(error = %e, \"http server error\");\n            }\n        });\n    }\n\n    // Workflow file watcher\n    let orch_for_watch = orchestrator.clone();\n    let watch_path = workflow_path.clone();\n    tokio::spawn(async move {\n        let (tx, mut rx) = tokio::sync::mpsc::channel(1);\n        let mut watcher = match notify::recommended_watcher(move |res: Result\u003cnotify::Event, notify::Error\u003e| {\n            if let Ok(event) = res {\n                if event.kind.is_modify() {\n                    let _ = tx.try_send(());\n                }\n            }\n        }) {\n            Ok(w) =\u003e w,\n            Err(e) =\u003e {\n                warn!(error = %e, \"failed to create file watcher\");\n                return;\n            }\n        };\n        use notify::Watcher;\n        let _ = watcher.watch(\u0026watch_path, notify::RecursiveMode::NonRecursive);\n        while rx.recv().await.is_some() {\n            tokio::time::sleep(tokio::time::Duration::from_millis(500)).await;\n            let new_workflow = match WorkflowLoader::new(Some(watch_path.clone())).load() {\n                Ok(w) =\u003e w,\n                Err(e) =\u003e {\n                    warn!(error = %e, \"failed to reload workflow\");\n                    continue;\n                }\n            };\n            let new_config = ServiceConfig::new(\n                new_workflow.config,\n                workflow_dir.clone(),\n                new_workflow.prompt_template,\n            );\n            info!(\"workflow reloaded\");\n            orch_for_watch.reload_config(new_config).await;\n        }\n    });\n\n    // Main loop\n    let mut interval = tokio::time::interval(tokio::time::Duration::from_millis(config.poll_interval_ms()));\n    interval.tick().await; // first tick immediate-ish\n\n    loop {\n        interval.tick().await;\n        let cfg = orchestrator.config.read().await.clone();\n        interval = tokio::time::interval(tokio::time::Duration::from_millis(cfg.poll_interval_ms()));\n        orchestrator.tick().await;\n        orchestrator.process_retries().await;\n    }\n}\n","traces":[{"line":56,"address":[12080160,12080645,12080651],"length":1,"stats":{"Line":0}},{"line":57,"address":[11987396],"length":1,"stats":{"Line":0}},{"line":59,"address":[11987819,11987695],"length":1,"stats":{"Line":0}},{"line":60,"address":[11993336,11987746,11987714,11987781,11987827],"length":1,"stats":{"Line":0}},{"line":61,"address":[11987870],"length":1,"stats":{"Line":0}},{"line":65,"address":[11988018],"length":1,"stats":{"Line":0}},{"line":66,"address":[12012960,12012972,11988033],"length":1,"stats":{"Line":0}},{"line":67,"address":[11988395,11988093],"length":1,"stats":{"Line":0}},{"line":69,"address":[11988256],"length":1,"stats":{"Line":0}},{"line":71,"address":[11988385,11988402,12013008,12013048],"length":1,"stats":{"Line":0}},{"line":73,"address":[11988517,11988439],"length":1,"stats":{"Line":0}},{"line":7 npub struct OrchestratorState {\n    pub poll_interval_ms: u64,\n    pub max_concurrent_agents: usize,\n    pub running: HashMap\u003cString, RunningEntry\u003e,\n    pub claimed: HashSet\u003cString\u003e,\n    pub retry_attempts: HashMap\u003cString, RetryEntry\u003e,\n    pub completed: HashSet\u003cString\u003e,\n    pub codex_totals: TokenTotals,\n    pub codex_rate_limits: Option\u003cserde_json::Value\u003e,\n}\n\nimpl OrchestratorState {\n    pub fn new(poll_interval_ms: u64, max_concurrent_agents: usize) -\u003e Self {\n        Self {\n            poll_interval_ms,\n            max_concurrent_agents,\n            running: HashMap::new(),\n            claimed: HashSet::new(),\n            retry_attempts: HashMap::new(),\n            completed: HashSet::new(),\n            codex_totals: TokenTotals::default(),\n            codex_rate_limits: None,\n        }\n    }\n\n    pub fn available_slots(\u0026self, _per_state: \u0026HashMap\u003cString, usize\u003e) -\u003e usize {\n        let global = self.max_concurrent_agents.saturating_sub(self.running.len());\n        // For simplicity, global limit is the primary constraint.\n        // Per-state limits would require counting running issues by state.\n        global\n    }\n\n    pub fn count_running_by_state(\u0026self, state: \u0026str) -\u003e usize {\n        let needle = state.to_lowercase();\n        self.running\n            .values()\n            .filter(|e| e.issue.state.to_lowercase() == needle)\n            .count()\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_state_new() {\n        let state = OrchestratorState::new(5000, 5);\n        assert_eq!(state.poll_interval_ms, 5000);\n        assert_eq!(state.max_concurrent_agents, 5);\n        assert!(state.running.is_empty());\n        assert!(state.claimed.is_empty());\n        assert!(state.retry_attempts.is_empty());\n        assert!(state.completed.is_empty());\n        assert_eq!(state.codex_totals.input_tokens, 0);\n        assert!(state.codex_rate_limits.is_none());\n    }\n\n    #[test]\n    fn test_available_slots() {\n        let mut state = OrchestratorState::new(10000, 3);\n        assert_eq!(state.available_slots(\u0026HashMap::new()), 3);\n\n        state.running.insert(\n            \"1\".into(),\n            RunningEntry {\n                issue: Issue {\n                    id: \"1\".into(),\n                    identifier: \"TEST-1\".into(),\n                    title: \"a\".into(),\n                    description: None,\n                    priority: None,\n                    state: \"todo\".into(),\n                    branch_name: None,\n                    url: None,\n                    labels: vec![],\n                    blocked_by: vec![],\n                    created_at: None,\n                    updated_at: None,\n                },\n                session: None,\n                started_at: chrono::Utc::now(),\n                retry_attempt: None,\n                turn_count: 0,\n                cancelled: Arc::new(AtomicBool::new(false)),\n            },\n        );\n        assert_eq!(state.available_slots(\u0026HashMap::new()), 2);\n    }\n\n    #[test]\n    fn test_available_slots_saturating() {\n        let mut state = OrchestratorState::new(10000, 1);\n        state.running.insert(\n            \"1\".into(),\n            RunningEntry {\n                issue: Issue {\n                    id: \"1\".into(),\n                    identifier: \"TEST-1\".into(),\n                    title: \"a\".into(),\n                    description: None,\n                    priority: None,\n                    state: \"todo\".into(),\n                    branch_name: None,\n                    url: None,\n                    labels: vec![],\n                    blocked_by: vec![],\n                    created_at: None,\n                    updated_at: None,\n                },\n                session: None,\n                started_at: chrono::Utc::now( :sync::atomic::{AtomicBool, Ordering};\nuse std::sync::Arc;\nuse tokio::sync::RwLock;\nuse tracing::{error, info, warn};\n\npub struct Orchestrator {\n    pub state: Arc\u003cRwLock\u003cOrchestratorState\u003e\u003e,\n    pub config: Arc\u003cRwLock\u003cServiceConfig\u003e\u003e,\n    tracker: Arc\u003cdyn IssueTracker\u003e,\n    runner: Arc\u003cAgentRunner\u003e,\n    workspace_manager: Arc\u003cWorkspaceManager\u003e,\n}\n\nimpl Orchestrator {\n    pub fn new(\n        config: ServiceConfig,\n        tracker: Arc\u003cdyn IssueTracker\u003e,\n    ) -\u003e Result\u003cSelf, SympheoError\u003e {\n        let state = OrchestratorState::new(\n            config.poll_interval_ms(),\n            config.max_concurrent_agents(),\n        );\n        let workspace_manager = WorkspaceManager::new(\u0026config)?;\n        let runner = AgentRunner::new(\u0026config)?;\n        Ok(Self {\n            state: Arc::new(RwLock::new(state)),\n            config: Arc::new(RwLock::new(config)),\n            tracker,\n            runner: Arc::new(runner),\n            workspace_manager: Arc::new(workspace_manager),\n        })\n    }\n\n    pub async fn reload_config(\u0026self, config: ServiceConfig) {\n        let mut state = self.state.write().await;\n        state.poll_interval_ms = config.poll_interval_ms();\n        state.max_concurrent_agents = config.max_concurrent_agents();\n        *self.config.write().await = config;\n    }\n\n    pub async fn tick(\u0026self) {\n        info!(\"orchestrator tick start\");\n\n        // Part A: Reconcile\n        if let Err(e) = self.reconcile().await {\n            warn!(error = %e, \"reconciliation failed\");\n        }\n\n        // Preflight validation\n        let config = self.config.read().await.clone();\n        if let Err(e) = config.validate_for_dispatch() {\n            warn!(error = %e, \"dispatch validation failed, skipping dispatch\");\n            return;\n        }\n\n        // Fetch candidates\n        let candidates = match self.tracker.fetch_candidate_issues().await {\n            Ok(issues) =\u003e issues,\n            Err(e) =\u003e {\n                warn!(error = %e, \"candidate fetch failed\");\n                return;\n            }\n        };\n\n        let active_states = config.active_states();\n        let terminal_states = config.terminal_states();\n        let max_turns = config.max_turns();\n        let per_state_limits = config.max_concurrent_agents_by_state();\n\n        let mut eligible: Vec\u003cIssue\u003e = candidates\n            .into_iter()\n            .filter(|i| {\n                let state_lc = i.state.to_lowercase();\n                active_states.contains(\u0026state_lc) \u0026\u0026 !terminal_states.contains(\u0026state_lc)\n            })\n            .filter(|i| {\n                let state_lc = i.state.to_lowercase();\n                if state_lc == \"todo\" {\n                    !i.is_blocked(\u0026terminal_states)\n                } else {\n                    true\n                }\n            })\n            .collect();\n\n        // Sort by priority asc, created_at asc, identifier asc\n        eligible.sort_by(|a, b| {\n            a.priority\n                .unwrap_or(i32::MAX)\n                .cmp(\u0026b.priority.unwrap_or(i32::MAX))\n                .then_with(|| a.created_at.cmp(\u0026b.created_at))\n                .then_with(|| a.identifier.cmp(\u0026b.identifier))\n        });\n\n        let mut state = self.state.write().await;\n        for issue in eligible {\n            if state.available_slots(\u0026per_state_limits) == 0 {\n                break;\n            }\n            if state.running.contains_key(\u0026issue.id) || state.claimed.contains(\u0026issue.id) {\n                continue;\n            }\n\n            let state_limit = per_state_limits\n                .get(\u0026issue.state.to_lowercase())\n                .copied()\n                .unwrap_or(state.max_concurrent_agents);\n            if state.count_running_by_state(\u0026issue.state) \u003e= state_limit {\n                continue;\n            }\n\n            // Dispatch\n            let issue_id = issue.id.clone();\n            let cancelled = Arc::new(AtomicBool::new(false));\n            state.claimed.insert(issue_id.clone());\n            state.running.insert(\n                issue_id.clone(),\n                RunningEntry {\n                    issue: issue.clone(),\n                    session: None,\n                    started_at: Utc::now(),\n                    retry_attempt: None,\n                    turn_count: 0,\n                    cancelled: cancelled.clone(),\n                },\n            );\n            drop(state); // release lock before spawning\n\n            self.spawn_worker(issue, None, max_turns, cancelled);\n\n            state = self.state.write().await;\n        }\n\n        info!(\"orchestrator tick end\");\n    }\n\n    async fn reconcile(\u0026self) -\u003e Result\u003c(), SympheoError\u003e {\n        let running_ids: Vec\u003cString\u003e = {\n            let state = self.state.read().await;\n            state.running.keys().cloned().collect()\n        };\n\n        if running_ids.is_empty() {\n            return Ok(());\n        }\n\n        let config = self.config.read().await.clone();\n        let stall_timeout_ms = config.codex_stall_timeout_ms();\n\n        // Stall detection\n        let now = Utc::now();\n        let mut to_kill = vec![];\n        {\n            let state = self.state.read().await;\n            for (id, entry) in \u0026state.running {\n                if stall_timeout_ms \u003c= 0 {\n                    continue;\n                }\n                let elapsed = if let Some(ref sess) = entry.session {\n                    if let Some(ts) = sess.last_timestamp {\n                        (now - ts).num_milliseconds() as u64\n                    } else {\n                        (now - entry.started_at).num_milliseconds() as u64\n                    }\n                } else {\n                    (now - entry.started_at).num_milliseconds() as u64\n                };\n                if elapsed \u003e stall_timeout_ms as u64 {\n                    to_kill.push(id.clone());\n                }\n            }\n        }\n\n        for id in to_kill {\n            warn!(issue_id = %id, \"stall detected, terminating\");\n            self.handle_worker_exit(\u0026id, false, Some(\"stalled\".into())).await;\n        }\n\n        // Tracker state refresh\n        let refreshed = self\n            .tracker\n            .fetch_issue_states_by_ids(\u0026running_ids)\n            .await?;\n\n        let active_states = config.active_states();\n        let terminal_states = config.terminal_states();\n\n        let mut state = self.state.write().await;\n        for issue in refreshed {\n            let state_lc = issue.state.to_lowercase();\n            if terminal_states.contains(\u0026state_lc) {\n                if let Some(entry) = state.running.get(\u0026issue.id) {\n                    entry.cancelled.store(true, Ordering::Relaxed);\n                }\n                if let Some(entry) = state.running.remove(\u0026issue.id) {\n                    state.claimed.remove(\u0026issue.id);\n                    drop(state);\n                    self.workspace_manager\n                        .remove_workspace(\u0026entry.issue.identifier, config.hook_script(\"before_remove\").as_deref())\n                        .await;\n                    state = self.state.write().await;\n                }\n            } else if active_states.contains(\u0026state_lc) {\n                if let Some(entry) = state.running.get_mut(\u0026issue.id) {\n                    entry.issue = issue;\n                }\n            } else {\n                if let Some(entry) = state.running.get(\u0026issue.id) {\n                    entry.cancelled.store(true, Ordering::Relaxed);\n                }\n                if state.running.remove(\u0026issue.id).is_some() {\n                    state.claimed.remove(\u0026issue.id);\n                }\n            }\n        }\n\n        Ok(())\n    }\n\n    fn spawn_worker(\u0026self, issue: Issue, attempt: Option\u003cu32\u003e, max_turns: u32, cancelled: Arc\u003cAtomicBool\u003e) {\n        let state = self.state.clone();\n        let config = self.config.clone();\n        let runner = self.runner.clone();\n        let tracker = self.tracker.clone();\n        let workspace_manager = self.workspace_manager.clone();\n\n        tokio::spawn(async move {\n            let cfg = config.read().await.clone();\n            let result = run_worker(\n                issue.clone(),\n                attempt,\n                max_turns,\n                \u0026cfg,\n                runner.as_ref(),\n                tracker.as_ref(),\n                workspace_manager.as_ref(),\n                state.clone(),\n                cancelled,\n            )\n            .await;\n\n            let mut st = state.write().await;\n            // Accumulate runtime for the finished session\n            if let Some(entry) = st.running.get(\u0026issue.id) {\n                let elapsed = (Utc::now() - entry.started_at).num_seconds() as f64;\n                st.codex_totals.seconds_running += elapsed;\n            }\n            match result {\n                Ok(()) =\u003e {\n                    info!(issue_id = %issue.id, \"worker exited normally\");\n                    if let Some(entry) = st.running.remove(\u0026issue.id) {\n                        st.completed.insert(issue.id.clone());\n                        let retry = schedule_retry(\n                            issue.id.clone(),\n                            entry.issue.identifier.clone(),\n                            1,\n                            None,\n                            \u0026cfg,\n                            true,\n                        );\n                        st.retry_attempts.insert(issue.id.clone(), retry);\n                    }\n                }\n                Err(e) =\u003e {\n                    error!(issue_id = %issue.id, error = %e, \"worker failed\");\n                    if let Some(entry) = st.running.remove(\u0026issue.id) {\n                        let next_attempt = attempt.unwrap_or(0) + 1;\n                        let retry = schedule_retry(\n                            issue.id.clone(),\n                            entry.issue.identifier.clone(),\n                            next_attempt,\n                            Some(e.to_string()),\n                            \u0026cfg,\n                            false,\n                        );\n                        st.retry_attempts.insert(issue.id.clone(), retry);\n                    }\n                }\n            }\n        });\n    }\n\n    pub async fn handle_worker_exit(\n        \u0026self,\n        issue_id: \u0026str,\n        normal: bool,\n        error: Option\u003cString\u003e,\n    ) {\n        let mut state = self.state.write().await;\n        let cfg = self.config.read().await.clone();\n        if let Some(entry) = state.running.remove(issue_id) {\n            let elapsed = (Utc::now() - entry.started_at).num_seconds() as f64;\n            state.codex_totals.seconds_running += elapsed;\n            if normal {\n                state.completed.insert(issue_id.to_string());\n                let retry = schedule_retry(\n                    issue_id.to_string(),\n                    entry.issue.identifier.clone(),\n                    1,\n                    None,\n                    \u0026cfg,\n                    true,\n                );\n                state.retry_attempts.insert(issue_id.to_string(), retry);\n            } else {\n                let next_attempt = entry.retry_attempt.unwrap_or(0) + 1;\n                let retry = schedule_retry(\n                    issue_id.to_string(),\n                    entry.issue.identifier.clone(),\n                    next_attempt,\n                    error,\n                    \u0026cfg,\n                    false,\n                );\n                state.retry_attempts.insert(issue_id.to_string(), retry);\n            }\n        }\n    }\n\n    pub async fn process_retries(\u0026self) {\n        let now = Instant::now();\n        let due: Vec\u003c(String, crate::tracker::model::RetryEntry)\u003e = {\n            let state = self.state.read().await;\n            state\n                .retry_attempts\n                .iter()\n                .filter(|(_, entry)| entry.due_at \u003c= now)\n                .map(|(k, v)| (k.clone(), v.clone()))\n                .collect()\n        };\n\n        for (issue_id, retry) in due {\n            let mut state = self.state.write().await;\n            state.retry_attempts.remove(\u0026issue_id);\n            drop(state);\n\n            let candidates = match self.tracker.fetch_candidate_issues().await {\n                Ok(c) =\u003e c,\n                Err(e) =\u003e {\n                    warn!(issue_id = %issue_id, error = %e, \"retry candidate fetch failed, requeuing\");\n                    let config = self.config.read().await.clone();\n                    let new_retry = schedule_retry(\n                        issue_id.clone(),\n                        retry.identifier.clone(),\n                        retry.attempt + 1,\n                        Some(\"retry poll failed\".into()),\n                        \u0026config,\n                        false,\n                    );\n                    let mut st = self.state.write().await;\n                    st.retry_attempts.insert(issue_id, new_retry);\n                    continue;\n                }\n            };\n\n            let config = self.config.read().await.clone();\n            if let Some(issue) = candidates.into_iter().find(|i| i.id == issue_id) {\n                let active = config.active_states();\n                let terminal = config.terminal_states();\n                let state_lc = issue.state.to_lowercase();\n                if terminal.contains(\u0026state_lc) || !active.contains(\u0026state_lc) {\n                    let mut st = self.state.write().await;\n                    st.claimed.remove(\u0026issue_id);\n                    continue;\n                }\n\n                let mut st = self.state.write().await;\n                if st.available_slots(\u0026config.max_concurrent_agents_by_state()) == 0 {\n                    let new_retry = schedule_retry(\n                        issue_id.clone(),\n                        issue.identifier.clone(),\n                        retry.attempt,\n                        Some(\"no available orchestrator slots\".into()),\n                        \u0026config,\n                        false,\n                    );\n                    st.retry_attempts.insert(issue_id, new_retry);\n                    continue;\n                }\n                let cancelled = Arc::new(AtomicBool::new(false));\n                st.claimed.insert(issue_id.clone());\n                st.running.insert(\n                    issue_id.clone(),\n                    RunningEntry {\n                        issue: issue.clone(),\n                        session: None,\n                        started_at: Utc::now(),\n                        retry_attempt: Some(retry.attempt),\n                        turn_count: 0,\n                        cancelled: cancelled.clone(),\n                    },\n                );\n                drop(st);\n                self.spawn_worker(issue, Some(retry.attempt), config.max_turns(), cancelled);\n            } else {\n                let mut st = self.state.write().await;\n                st.claimed.remove(\u0026issue_id);\n            }\n        }\n    }\n}\n\nuse std::time::Instant;\n\n#[allow(clippy::too_many_arguments)]\nasync fn run_worker(\n    issue: Issue,\n    attempt: Option\u003cu32\u003e,\n    max_turns: u32,\n    config: \u0026ServiceConfig,\n    runner: \u0026AgentRunner,\n    tracker: \u0026dyn IssueTracker,\n    workspace_manager: \u0026WorkspaceManager,\n    state: Arc\u003cRwLock\u003cOrchestratorState\u003e\u003e,\n    cancelled: Arc\u003cAtomicBool\u003e,\n) -\u003e Result\u003c(), SympheoError\u003e {\n    let workspace = workspace_manager\n        .create_or_reuse(\n            \u0026issue.identifier,\n            config.hook_script(\"after_create\").as_deref(),\n        )\n        .await?;\n\n    if let Some(script) = config.hook_script(\"before_run\") {\n        workspace_manager\n            .run_hook(\"before_run\", \u0026script, \u0026workspace.path)\n            .await?;\n    }\n\n    let mut current_session: Option\u003cString\u003e = None;\n    let mut turn_number = 1;\n\n    loop {\n        if cancelled.load(Ordering::Relaxed) {\n            info!(issue_id = %issue.id, \"worker cancelled by orchestrator, stopping\");\n            break;\n        }\n\n        let prompt = if turn_number == 1 {\n            build_prompt(config, \u0026issue, attempt)?\n        } else {\n            \"Continue working on the current task. Review the conversation history and proceed with the next step.\".to_string()\n        };\n\n        let turn_result = runner\n            .run_turn(\u0026issue, \u0026prompt, current_session.as_deref(), \u0026workspace.path)\n            .await?;\n\n        // Update orchestrator state with session metadata and tokens\n        {\n            let mut st = state.write().await;\n            if let Some(entry) = st.running.get_mut(\u0026issue.id) {\n                entry.turn_count += 1;\n                entry.session = Some(LiveSession {\n                    session_id: format!(\"{}-{}\", turn_result.session_id, turn_result.turn_id),\n                    thread_id: turn_result.session_id.clone(),\n                    turn_id: turn_result.turn_id.clone(),\n                    agent_pid: None,\n                    last_event: Some(\"turn_completed\".into()),\n                    last_timestamp: Some(Utc::now()),\n                    last_message: Some(turn_result.text.clone()),\n                    input_tokens: turn_result.tokens.as_ref().map(|t| t.input).unwrap_or(0),\n                    output_tokens: turn_result.tokens.as_ref().map(|t| t.output).unwrap_or(0),\n                    total_tokens: turn_result.tokens.as_ref().map(|t| t.total).unwrap_or(0),\n                    last_reported_input_tokens: turn_result.tokens.as_ref().map(|t| t.input).unwrap_or(0),\n                    last_reported_output_tokens: turn_result.tokens.as_ref().map(|t| t.output).unwrap_or(0),\n                    last_reported_total_tokens: turn_result.tokens.as_ref().map(|t| t.total).unwrap_or(0),\n                    turn_count: entry.turn_count,\n                });\n                if let Some(ref tokens) = turn_result.tokens {\n                    st.codex_totals.input_tokens += tokens.input;\n                    st.codex_totals.output_tokens += tokens.output;\n                    st.codex_totals.total_tokens += tokens.total;\n                }\n            }\n        }\n\n        if !turn_result.success {\n            return Err(SympheoError::AgentRunnerError(\n                \"turn reported failure\".into(),\n            ));\n        }\n\n        current_session = Some(turn_result.session_id);\n\n        // Refresh issue state\n        let refreshed = tracker\n            .fetch_issue_states_by_ids(std::slice::from_ref(\u0026issue.id))\n            .await?;\n        let active_states = config.active_states();\n        let terminal_states = config.terminal_states();\n\n        if let Some(refreshed_issue) = refreshed.into_iter().next() {\n            let state_lc = refreshed_issue.state.to_lowercase();\n            if terminal_states.contains(\u0026state_lc) || !active_states.contains(\u0026state_lc) {\n                break;\n            }\n        }\n\n        if turn_number \u003e= max_turns {\n            break;\n        }\n        turn_number += 1;\n    }\n\n    if let Some(scri 003e (StatusCode, String) {\n    let st = state.read().await;\n    let html = format!(\n        \"\u003chtml\u003e\u003cbody\u003e\u003ch1\u003eSymphony\u003c/h1\u003e\u003cp\u003eRunning: {}\u003c/p\u003e\u003cp\u003eRetrying: {}\u003c/p\u003e\u003c/body\u003e\u003c/html\u003e\",\n        st.running.len(),\n        st.retry_attempts.len()\n    );\n    (StatusCode::OK, html)\n}\n\nasync fn api_state(State(state): State\u003cSharedState\u003e) -\u003e Json\u003cserde_json::Value\u003e {\n    let st = state.read().await;\n    let now = chrono::Utc::now().to_rfc3339();\n    let running: Vec\u003cserde_json::Value\u003e = st\n        .running\n        .values()\n        .map(|e| {\n            json!({\n                \"issue_id\": e.issue.id,\n                \"issue_identifier\": e.issue.identifier,\n                \"state\": e.issue.state,\n                \"session_id\": e.session.as_ref().map(|s| s.session_id.clone()).unwrap_or_default(),\n                \"turn_count\": e.turn_count,\n                \"started_at\": e.started_at.to_rfc3339(),\n            })\n        })\n        .collect();\n    let retrying: Vec\u003cserde_json::Value\u003e = st\n        .retry_attempts\n        .values()\n        .map(|r| {\n            json!({\n                \"issue_id\": r.issue_id,\n                \"issue_identifier\": r.identifier,\n                \"attempt\": r.attempt,\n                \"error\": r.error,\n            })\n        })\n        .collect();\n    Json(json!({\n        \"generated_at\": now,\n        \"counts\": {\n            \"running\": st.running.len(),\n            \"retrying\": st.retry_attempts.len()\n        },\n        \"running\": running,\n        \"retrying\": retrying,\n        \"codex_totals\": {\n            \"input_tokens\": st.codex_totals.input_tokens,\n            \"output_tokens\": st.codex_totals.output_tokens,\n            \"total_tokens\": st.codex_totals.total_tokens,\n            \"seconds_running\": st.codex_totals.seconds_running,\n        },\n        \"rate_limits\": st.codex_rate_limits,\n    }))\n}\n\nasync fn api_refresh(State(_state): State\u003cSharedState\u003e) -\u003e Json\u003cserde_json::Value\u003e {\n    Json(json!({\n        \"queued\": true,\n        \"coalesced\": false,\n        \"requested_at\": chrono::Utc::now().to_rfc3339(),\n        \"operations\": [\"poll\", \"reconcile\"]\n    }))\n}\n\nasync fn api_issue(\n    State(state): State\u003cSharedState\u003e,\n    AxumPath(issue_identifier): AxumPath\u003cString\u003e,\n) -\u003e Result\u003cJson\u003cserde_json::Value\u003e, StatusCode\u003e {\n    let st = state.read().await;\n    let entry = st\n        .running\n        .values()\n        .find(|e| e.issue.identifier == issue_identifier);\n    if let Some(entry) = entry {\n        Ok(Json(json!({\n            \"issue_identifier\": entry.issue.identifier,\n            \"issue_id\": entry.issue.id,\n            \"status\": \"running\",\n            \"started_at\": entry.started_at.to_rfc3339(),\n            \"turn_count\": entry.turn_count,\n        })))\n    } else {\n        Err(StatusCode::NOT_FOUND)\n    }\n}\n","traces":[{"line":15,"address":[12381488,12381504],"length":1,"stats":{"Line":5}},{"line":16,"address":[11207563,11206713,11207223,11207369,11206931,11207077,11207463,11207289,11206997,11206859,11207143],"length":1,"stats":{"Line":11}},{"line":17,"address":[11509324,11509483,11510615,11509545,11510578,11509426,11509399],"length":1,"stats":{"Line":3}},{"line":18,"address":[13370723,13371610,13371554,13370585,13370356,13371583,13370661,13370604],"length":1,"stats":{"Line":3}},{"line":19,"address":[11626986,11627090,11626287,11627007,11625836,11626230,11627034,11626211,11626349],"length":1,"stats":{"Line":3}},{"line":20,"address":[11730032,11730089,11729492,11730596,11730746,11730642,11730013,11730690],"length":1,"stats":{"Line":2}},{"line":21,"address":[11207566,11207475,11207451],"length":1,"stats":{"Line":3}},{"line":23,"address":[13371909,13371846,13371242,1 gth":1,"stats":{"Line":1}}],"covered":50,"coverable":52},{"path":["/","home","supergeoff","projects","sympheo","src","tracker","github.rs"],"content":"use crate::config::typed::ServiceConfig;\nuse crate::error::SympheoError;\nuse crate::tracker::model::Issue;\nuse crate::tracker::IssueTracker;\nuse async_trait::async_trait;\nuse chrono::{DateTime, Utc};\nuse reqwest::header::{ACCEPT, AUTHORIZATION, HeaderMap, HeaderValue, USER_AGENT};\nuse serde_json::json;\n\npub struct GithubTracker {\n    client: reqwest::Client,\n    owner: String,\n    repo: String,\n    project_number: i64,\n    endpoint: String,\n}\n\nimpl GithubTracker {\n    pub fn new(config: \u0026ServiceConfig) -\u003e Result\u003cSelf, SympheoError\u003e {\n        let api_key = config\n            .tracker_api_key()\n            .ok_or(SympheoError::MissingTrackerApiKey)?;\n        let project = config\n            .tracker_project_slug()\n            .ok_or(SympheoError::MissingTrackerProjectSlug)?;\n        let project_number = config\n            .tracker_project_number()\n            .ok_or_else(|| SympheoError::InvalidConfiguration(\n                \"tracker.project_number is required for github projects\".into(),\n            ))?;\n        let parts: Vec\u003c\u0026str\u003e = project.split('/').collect();\n        if parts.len() != 2 {\n            return Err(SympheoError::InvalidConfiguration(\n                \"tracker.project_slug must be owner/repo\".into(),\n            ));\n        }\n        let mut headers = HeaderMap::new();\n        let auth = HeaderValue::from_str(\u0026format!(\"Bearer {api_key}\"))\n            .map_err(|e| SympheoError::InvalidConfiguration(e.to_string()))?;\n        headers.insert(AUTHORIZATION, auth);\n        headers.insert(\n            USER_AGENT,\n            HeaderValue::from_static(\"sympheo/0.1.0\"),\n        );\n        headers.insert(\n            ACCEPT,\n            HeaderValue::from_static(\"application/vnd.github+json\"),\n        );\n        let client = reqwest::Client::builder()\n            .default_headers(headers)\n            .timeout(std::time::Duration::from_secs(30))\n            .build()\n            .map_err(|e| SympheoError::TrackerApiRequest(e.to_string()))?;\n        Ok(Self {\n            client,\n            owner: parts[0].to_string(),\n            repo: parts[1].to_string(),\n            project_number,\n            endpoint: config.tracker_endpoint(),\n        })\n    }\n\n    async fn graphql_query(\n        \u0026self,\n        query: \u0026str,\n        variables: serde_json::Value,\n    ) -\u003e Result\u003cserde_json::Value, SympheoError\u003e {\n        let body = json!({ \"query\": query, \"variables\": variables });\n        let resp = self\n            .client\n            .post(format!(\"{}/graphql\", self.endpoint))\n            .json(\u0026body)\n            .send()\n            .await\n            .map_err(|e| SympheoError::TrackerApiRequest(e.to_string()))?;\n        let status = resp.status();\n        let json: serde_json::Value = resp\n            .json()\n            .await\n            .map_err(|e| SympheoError::TrackerMalformedPayload(e.to_string()))?;\n        if let Some(errors) = json.get(\"errors\") {\n            return Err(SympheoError::TrackerApiStatus(format!(\n                \"GraphQL errors: {}\",\n                errors\n            )));\n        }\n        if !status.is_success() {\n            return Err(SympheoError::TrackerApiStatus(format!(\n                \"HTTP {}: {}\",\n                status, json\n            )));\n        }\n        Ok(json[\"data\"].clone())\n    }\n\n    async fn fetch_project_items(\u0026self) -\u003e Result\u003cVec\u003cserde_json::Value\u003e, SympheoError\u003e {\n        // Determine if owner is an organization or a user\n        let org_query = r#\"\n            query($owner: String!, $projectNumber: Int!) {\n              organization(login: $owner) {\n                projectV2(number: $projectNumber) { id }\n              }\n            }\n        \"#;\n        let is_org = match self\n            .graphql_query(org_query, json!({\"owner\": \u0026self.owner, \"projectNumber\": self.project_number}))\n            .await\n        {\n            Ok(org_data) =\u003e org_data\n                .get(\"organization\")\n                .and_then(|o| o.get(\"projectV2\"))\n                .is_some(),\n            Err(_) =\u003e false, // Not an org (or project doesn't exist on org), try user\n        };\n\n        let query_template = if is_org {\n            r#\"\n            query($owner: String!, $projectNumber: Int!, $first: Int!, $after: String) {\n              organization(login: $owner) {\n                projectV2(number: $projectNumber) {\n                  items(first: $first, after: $after) {\n                    nodes {\n                      id\n                      content {\n                        ... on Issue {\n                          id\n                          number\n                          title\n                          body\n                          state\n                          labels(first: 10) { nodes { name } }\n                          createdAt\n                          updatedAt\n                          url\n                          repository { name owner { login } }\n                        }\n                      }\n                      fieldValues(first: 20) {\n                        nodes {\n                          ... on ProjectV2ItemFieldSingleSelectValue {\n                            field { ... on ProjectV2FieldCommon { name } }\n                            name\n                          }\n                        }\n                      }\n                    }\n                    pageInfo { hasNextPage endCursor }\n                  }\n                }\n              }\n            }\n            \"#\n        } else {\n            r#\"\n            query($owner: String!, $projectNumber: Int!, $first: Int!, $after: String) {\n              user(login: $owner) {\n                projectV2(number: $projectNumber) {\n                  items(first: $first, after: $after) {\n                    nodes {\n                      id\n                      content {\n                        ... on Issue {\n                          id\n                          number\n                          title\n                          body\n                          state\n                          labels(first: 10) { nodes { name } }\n                          createdAt\n                          updatedAt\n                          url\n                          repository { name owner { login } }\n                        }\n                      }\n                      fieldValues(first: 20) {\n                        nodes {\n                          ... on ProjectV2ItemFieldSingleSelectValue {\n                            field { ... on ProjectV2FieldCommon { name } }\n                            name\n                          }\n                        }\n                      }\n                    }\n                    pageInfo { hasNextPage endCursor }\n                  }\n                }\n              }\n            }\n            \"#\n        };\n\n        let mut all = vec![];\n        let mut cursor: Option\u003cString\u003e = None;\n        loop {\n            let vars = json!({\n                \"owner\": self.owner,\n                \"projectNumber\": self.project_number,\n                \"first\": 50,\n                \"after\": cursor,\n            });\n            let data = self.graphql_query(query_template, vars).await?;\n            let root = if is_org {\n                data.get(\"organization\")\n            } else {\n                data.get(\"user\")\n            };\n            let items = root\n                .and_then(|r| r.get(\"projectV2\"))\n                .and_then(|p| p.get(\"items\"))\n                .and_then(|i| i.get(\"nodes\"))\n                .and_then(|n| n.as_array())\n                .cloned()\n                .unwrap_or_default();\n            let page_info = root\n                .and_then(|r| r.get(\"projectV2\"))\n                .and_then(|p| p.get(\"items\"))\n                .and_then(|i| i.get(\"pageInfo\"));\n            let has_next = page_info\n                .and_then(|pi| pi.get(\"hasNextPage\"))\n                .and_then(|h| h.as_bool())\n                .unwrap_or(false);\n            let next_cursor = page_info\n                .and_then(|pi| pi.get(\"endCursor\"))\n                .and_then(|c| c.as_str())\n                .map(|s| s.to_string());\n\n            all.extend(items);\n            if !has_next || next_cursor.is_none() {\n                break;\n            }\n            cursor = next_cursor;\n        }\n        Ok(all)\n    }\n\n    fn extract_status(\u0026self, item: \u0026serde_json::Value) -\u003e Option\u003cString\u003e {\n        item.get(\"fieldValues\")\n            .and_then(|fv| fv.get(\"nodes\"))\n            .and_then(|nodes| nodes.as_array())\n            .and_then(|arr| {\n                arr.iter().find_map(|node| {\n                    let field_name = node\n                        .get(\"field\")\n                        .and_then(|f| f.get(\"name\"))\n                        .and_then(|n| n.as_str())?;\n                    if field_name == \"Status\" {\n                        node.get(\"name\")\n                            .and_then(|n| n.as_str())\n                            .map(|s| s.to_lowercase())\n                    } else {\n                        None\n                    }\n                })\n            })\n    }\n\n    fn normalize_item(\u0026self, item: \u0026serde_json::Value) -\u003e Option\u003cIssue\u003e {\n        let content = item.get(\"content\")?;\n        content.get(\"number\")?;\n\n        let repo_name = content\n            .get(\"repository\")\n            .and_then(|r| r.get(\"name\"))\n            .and_then(|n| n.as_str())\n            .unwrap_or(\"\");\n        if repo_name != self.repo {\n            return None;\n        }\n\n        let number = content.get(\"number\")?.as_i64()?;\n        let title = content\n            .get(\"title\")\n            .and_then(|t| t.as_str())\n            .unwrap_or(\"\")\n            .to_string();\n        let body = content\n            .get(\"body\")\n            .and_then(|b| b.as_str())\n            .map(|s| s.to_string());\n        let labels: Vec\u003cString\u003e = content\n            .get(\"labels\")\n            .and_then(|l| l.get(\"nodes\"))\n            .and_then(|n| n.as_array())\n            .map(|arr| {\n                arr.iter()\n                    .filter_map(|node| {\n                        node.get(\"name\")\n                            .and_then(|n| n.as_str())\n                            .map(|s| s.to_lowercase())\n                    })\n                    .collect()\n            })\n            .unwrap_or_default();\n\n        let status = self.extract_status(item);\n        let state = status.unwrap_or_else(|| {\n            content\n                .get(\"state\")\n                .and_then(|s| s.as_str())\n                .unwrap_or(\"open\")\n                .to_lowercase()\n        });\n\n        Some(Issue {\n            id: number.to_string(),\n            identifier: format!(\"{}-{}\", self.repo.to_uppercase(), number),\n            title,\n            description: body,\n            priority: None,\n            state,\n            branch_name: None,\n            url: content\n                .get(\"url\")\n                .and_then(|u| u.as_str())\n                .map(|s| s.to_string()),\n            labels,\n            blocked_by: vec![],\n            created_at: content\n                .get(\"createdAt\")\n                .and_then(|s| s.as_str())\n                .and_then(|s| s.parse::\u003cDateTime\u003cUtc\u003e\u003e().ok()),\n            updated_at: content\n                .get(\"updatedAt\")\n                .and_then(|s| s.as_str())\n                .and_then(|s| s.parse::\u003cDateTime\u003cUtc\u003e\u003e().ok()),\n        })\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::path::PathBuf;\n\n    fn make_config(slug: \u0026str, number: i64, api_key: \u0026str) -\u003e ServiceConfig {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut tracker = serde_yaml::Mapping::new();\n        tracker.insert(\n            serde_yaml::Value::String(\"kind\".into()),\n            serde_yaml::Value::String(\"github\".into()),\n        );\n        tracker.insert(\n            serde_yaml::Value::String(\"api_key\".into()),\n            serde_yaml::Value::String(api_key.into()),\n        );\n        tracker.insert(\n            serde_yaml::Value::String(\"project_slug\".into()),\n            serde_yaml::Value::String(slug.into()),\n        );\n        tracker.insert(\n            serde_yaml::Value::String(\"project_number\".into()),\n            serde_yaml::Value::Number(number.into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"tracker\".into()),\n            serde_yaml::Value::Mapping(tracker),\n        );\n        ServiceConfig::new(raw, PathBuf::from(\"/tmp\"), \"\".into())\n    }\n\n    #[test]\n    fn test_github_tracker_new_ok() {\n        let config = make_config(\"owner/repo\", 1, \"key\");\n        let tracker = GithubTracker::new(\u0026config).unwrap();\n        assert_eq!(tracker.owner, \"owner\");\n        assert_eq!(tracker.repo, \"repo\");\n        assert_eq!(tracker.project_number, 1);\n    }\n\n    #[test]\n    fn test_github_tracker_new_invalid_slug() {\n        let config = make_config(\"invalid\", 1, \"key\");\n        let result = GithubTracker::new(\u0026config);\n        assert!(matches!(result, Err(SympheoError::InvalidConfiguration(_))));\n    }\n\n    #[test]\n    fn test_github_tracker_new_missing_api_key() {\n        let mut raw = serde_yaml::Mapping::new();\n        let mut tracker = serde_yaml::Mapping::new();\n        tracker.insert(\n            serde_yaml::Value::String(\"kind\".into()),\n            serde_yaml::Value::String(\"github\".into()),\n        );\n        raw.insert(\n            serde_yaml::Value::String(\"tracker\".into()),\n            serde_yaml::Value::Mapping(tracker),\n        );\n        let config = ServiceConfig::new(raw, PathBuf::from(\"/tmp\"), \"\".into());\n        let result = GithubTracker::new(\u0026config);\n        assert!(matches!(result, Err(SympheoError::MissingTrackerApiKey)));\n    }\n\n    #[test]\n    fn test_extract_status_found() {\n        let config = make_config(\"owner/repo\", 1, \"key\");\n        let tracker = GithubTracker::new(\u0026config).unwrap();\n        let item = serde_json::json!({\n            \"fieldValues\": {\n                \"nodes\": [\n                    {\n                        \"field\": { \"name\": \"Status\" },\n                        \"name\": \"In Progress\"\n                    },\n                    {\n                        \"field\": { \"name\": \"Priority\" },\n                        \"name\": \"High\"\n                    }\n                ]\n            }\n        });\n        assert_eq!(tracker.extract_status(\u0026item), Some(\"in progress\".to_string()));\n    }\n\n    #[test]\n    fn test_extract_status_no_match() {\n        let config = make_config(\"owner/repo\", 1, \"key\");\n        let tracker = GithubTracker::new(\u0026config).unwrap();\n        let item = serde_json::json!({\n            \"fieldValues\": {\n                \"nodes\": [\n                    {\n                        \"field\": { \"name\": \"Priority\" },\n                        \"name\": \"High\"\n                    }\n                ]\n            }\n        });\n        assert_eq!(tracker.extract_status(\u0026item), None);\n    }\n\n    #[test]\n    fn test_extract_status_missing_field_values() {\n        let config = make_config(\"owner/repo\", 1, \"key\");\n Error\u003e {\n    let trimmed = content.trim_start();\n    if let Some(after_first) = trimmed.strip_prefix(\"---\") {\n        if let Some(end_idx) = after_first.find(\"---\") {\n            let front_matter = \u0026after_first[..end_idx];\n            let body = \u0026after_first[end_idx + 3..];\n            let yaml_value: serde_yaml::Value = serde_yaml::from_str(front_matter)\n                .map_err(|e| SympheoError::WorkflowParseError(e.to_string()))?;\n            let mapping = yaml_value.as_mapping().ok_or(SympheoError::WorkflowFrontMatterNotAMap)?;\n            Ok(WorkflowDefinition {\n                config: mapping.clone(),\n                prompt_template: body.trim().to_string(),\n            })\n        } else {\n            Err(SympheoError::WorkflowParseError(\n                \"unclosed front matter\".into(),\n            ))\n        }\n    } else {\n        Ok(WorkflowDefinition {\n            config: serde_yaml::Mapping::new(),\n            prompt_template: content.trim().to_string(),\n        })\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_parse_no_front_matter() {\n        let wf = parse(\"Hello world\").unwrap();\n        assert!(wf.config.is_empty());\n        assert_eq!(wf.prompt_template, \"Hello world\");\n    }\n\n    #[test]\n    fn test_parse_with_front_matter() {\n        let text = \"---\\ntracker:\\n  kind: github\\n---\\nDo work\";\n        let wf = parse(text).unwrap();\n        assert!(!wf.config.is_empty());\n        assert_eq!(wf.prompt_template, \"Do work\");\n    }\n\n    #[test]\n    fn test_parse_empty_front_matter() {\n        let text = \"---\\n---\\nJust prompt\";\n        // Empty YAML front matter parses as Null, not a Mapping\n        let result = parse(text);\n        assert!(matches!(result, Err(SympheoError::WorkflowFrontMatterNotAMap)));\n    }\n\n    #[test]\n    fn test_parse_unclosed_front_matter() {\n        let text = \"---\\ntracker: kind\\nDo work\";\n        let result = parse(text);\n        assert!(matches!(result, Err(SympheoError::WorkflowParseError(_))));\n    }\n\n    #[test]\n    fn test_parse_front_matter_not_a_map() {\n        let text = \"---\\n- item1\\n- item2\\n---\\nDo work\";\n        let result = parse(text);\n        assert!(matches!(result, Err(SympheoError::WorkflowFrontMatterNotAMap)));\n    }\n\n    #[test]\n    fn test_parse_invalid_yaml() {\n        let text = \"---\\ntracker: {bad yaml\\n---\\nDo work\";\n        let result = parse(text);\n        assert!(matches!(result, Err(SympheoError::WorkflowParseError(_))));\n    }\n\n    #[test]\n    fn test_parse_trim_whitespace() {\n        let text = \"   ---\\ntracker:\\n  kind: github\\n---\\n  Do work  \";\n        let wf = parse(text).unwrap();\n        assert_eq!(wf.prompt_template, \"Do work\");\n    }\n}\n","traces":[{"line":4,"address":[15102288,15103885,15103907],"length":1,"stats":{"Line":2}},{"line":5,"address":[11894897],"length":1,"stats":{"Line":3}},{"line":6,"address":[12311258,12309564],"length":1,"stats":{"Line":5}},{"line":7,"address":[15102846,15102593,15102487],"length":1,"stats":{"Line":10}},{"line":8,"address":[12586054],"length":1,"stats":{"Line":6}},{"line":9,"address":[11895565,11895202,11895410],"length":1,"stats":{"Line":8}},{"line":10,"address":[11895501,11895650,11895465],"length":1,"stats":{"Line":13}},{"line":11,"address":[14465600,14465618],"length":1,"stats":{"Line":5}},{"line":12,"address":[11895973,11895900],"length":1,"stats":{"Line":4}},{"line":13,"address":[15103755],"length":1,"stats":{"Line":2}},{"line":14,"address":[14203712],"length":1,"stats":{"Line":2}},{"line":15,"address":[12483528,12483457],"length":1,"stats":{"Line":5}},{"line":18,"address":[12482517],"length":1,"stats":{"Line":1}},{"line":19,"address":[12482476],"length":1,"stats":{"Line":1}},{"line":23,"address":[12483782],"length":1,"stats":{"Line":1}},{"line":24,"address":[11895092],"length":1,"stats":{"Line":1}},{"line":25,"address":[11896515,11895107],"length":1,"stats":{"Line":2}}],"covered":17,"coverable":17},{"path":["/","home","supergeoff","projects","sympheo","src","workspace","manager.rs"],"content":"use crate::config::typed::ServiceConfig;\nuse crate::error::SympheoError;\nuse crate::tracker::model::WorkspaceInfo;\nuse std::path::{Path, PathBuf};\nuse std::process::Stdio;\nuse tokio::process::Command;\nuse tokio::time::{timeout, Duration};\n\npub struct WorkspaceManager {\n    root: PathBuf,\n    hook_timeout: Duration,\n}\n\nimpl WorkspaceManager {\n    pub fn new(config: \u0026ServiceConfig) -\u003e Result\u003cSelf, SympheoError\u003e {\n        let root = config.workspace_root()?;\n        Ok(Self {\n            root,\n            hook_timeout: Duration::from_millis(config.hook_timeout_ms()),\n        })\n    }\n\n    pub fn sanitize_identifier(identifier: \u0026str) -\u003e String {\n        identifier\n            .chars()\n            .map(|c| {\n                if c.is_ascii_alphanumeric() || c == '.' || c == '_' || c == '-' {\n                    c\n                } else {\n                    '_'\n                }\n            })\n            .collect()\n    }\n\n    pub fn workspace_path(\u0026self, identifier: \u0026str) -\u003e PathBuf {\n        let key = Self::sanitize_identifier(identifier);\n        self.root.join(\u0026key)\n    }\n\n    pub async fn create_or_reuse(\n        \u0026self,\n        identifier: \u0026str,\n        after_create_hook: Option\u003c\u0026str\u003e,\n    ) -\u003e Result\u003cWorkspaceInfo, SympheoError\u003e {\n        let path = self.workspace_path(identifier);\n        let created_now = if !path.exists() {\n            tokio::fs::create_dir_all(\u0026path).await.map_err(|e| {\n                SympheoError::WorkspaceError(format!(\"failed to create workspace dir: {e}\"))\n            })?;\n            true\n        } else {\n            false\n        };\n\n        if created_now {\n            if let Some(script) = after_create_hook {\n                self.run_ho     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/').map(decodeURIComponent);
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
